<!DOCTYPE html>
<html lang="en-AU" >
<head>
  <meta charset='UTF-8'>
  <meta name="viewport" content='width=device-width, initial-scale=1.0'>
  <title>BigTalk</title>

  <!-- Make this Apple iOS Compatible-->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="BigTalk">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/Images/BTicon.png">

  <!-- Load Website Style Sheet -->
  <link rel='manifest' href='manifest.webmanifest'>
  <link rel="stylesheet" href='style.css'>
  <link rel="shortcut icon" href='/Images/bigtalk.ico' />

</head>
<body>
<div class="container">
  <div class="card" onclick="flipCard(this)">
    
    <!-- Front of Card -->
    <div class="front">
    </div>

    <!-- Back of Card -->
    <div class="back" id="question">
        BigTalk Question?
      </div>

  </div>
</div>
  <!-- Load the Chosen Questions -->
  <script>
    //Read URL parameters
    const queryString = window.location.search;
    const urlParams = new URLSearchParams(queryString);

    //Get background colour
    const bgColour = urlParams.has('bg') ? urlParams.get('bg') : "265834";
    document.body.style.backgroundColor = `#${bgColour}`;

    //Get requested question type
    const cardType = urlParams.has('type') ? urlParams.get('type') : 'BigTalk';

    //Load the Questions
    const questionsTag = document.createElement("script");
    questionsTag.src = `${cardType}.js`;
    document.body.appendChild(questionsTag);

    //Load the Logic
    const scriptTag = document.createElement("script");
    scriptTag.src = `functions.js`;
    document.body.appendChild(scriptTag);
  </script>
</body>
</html>
