<!DOCTYPE html>
<html>
<head>
    <title>Microsoft 365 URL Hack</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">

    <!-- Load Website Style Sheet -->
    <link rel='manifest' href='manifest.webmanifest'>
    <link rel="stylesheet" href='style.css'>
    <link rel="shortcut icon" href='/Images/bigtalk.ico' />
</head>

<body>
  <div class="container mt-5">
      <h2 class="mt-5">Select Tenant</h2>
      <select id="tenantDropdown" class="form-control" onchange="displayUsername(this.value)"></select>
      <button type="button" class="btn btn-danger mt-2" onclick="deleteDetails()">Delete</button>

      <h2>Enter New Details</h2>
      <form id="cookieForm">
          <div class="form-group">
              <label for="tenantID">Tenant ID:</label>
              <input type="text" class="form-control" id="tenantID" name="tenantID">
          </div>

          <div class="form-group">
              <label for="username">Username:</label>
              <input type="text" class="form-control" id="username" name="username">
          </div>
          
          <button type="button" class="btn btn-primary mt-5" onclick="saveDetails()">Save</button>
      </form> 


      <h2 class="mt-5">Username</h2><div id="usernameDisplay"></div>
  </div>

  <!-- URL Table -->
  <div class="url-table">
    <table>
      
    </table>
  </div>

  <!-- Add Dynamic Functionality -->
    <script  src="./functions.js"></script>
</body>
</html>
