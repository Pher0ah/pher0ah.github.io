<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindMap Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0e17;--bg2:#111827;--surface:#1a1f35;--text:#e2e8f0;
  --text-dim:#94a3b8;--accent:#38bdf8;--accent2:#818cf8;
  --border:#2a3050;--shadow:0 8px 32px rgba(0,0,0,.45);
  --toolbar-bg:rgba(17,24,39,.85);
}
[data-theme="light"]{
  --bg:#f0f2f7;--bg2:#ffffff;--surface:#ffffff;--text:#1e293b;
  --text-dim:#64748b;--accent:#0284c7;--accent2:#6366f1;
  --border:#cbd5e1;--shadow:0 8px 32px rgba(0,0,0,.1);
  --toolbar-bg:rgba(255,255,255,.85);
}
html,body{width:100%;height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}

#toolbar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 20px;
  background:var(--toolbar-bg);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);gap:8px;flex-wrap:wrap;
}
#toolbar h1{font-size:15px;font-weight:700;letter-spacing:-.3px;color:var(--text);white-space:nowrap}
#toolbar .subtitle{font-size:11px;color:var(--text-dim);margin-left:8px;font-weight:400}
.toolbar-group{display:flex;align-items:center;gap:6px;flex-wrap:wrap}

.tb-btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:5px 12px;border-radius:7px;border:1px solid var(--border);
  background:var(--surface);color:var(--text);font-size:12px;font-family:inherit;
  cursor:pointer;transition:all .15s;font-weight:500;white-space:nowrap;
}
.tb-btn:hover{border-color:var(--accent);color:var(--accent)}
.tb-btn svg{width:14px;height:14px;flex-shrink:0}
.tb-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.theme-toggle{
  width:42px;height:22px;border-radius:11px;border:1px solid var(--border);
  background:var(--surface);cursor:pointer;position:relative;transition:all .2s;flex-shrink:0;
}
.theme-toggle::after{
  content:'';position:absolute;top:2px;left:3px;width:15px;height:15px;
  border-radius:50%;background:var(--accent);transition:transform .25s;
}
[data-theme="light"] .theme-toggle::after{transform:translateX(19px)}

#canvas-wrap{
  position:absolute;inset:0;top:48px;right:0;overflow:hidden;
  background:var(--bg);
  background-image:radial-gradient(circle at 50% 50%,var(--bg2) 0%,var(--bg) 70%);
  transition:right .3s cubic-bezier(.4,0,.2,1);
}
#mindmap-svg{position:absolute;top:0;left:0;transform-origin:0 0;cursor:grab}
#mindmap-svg.grabbing{cursor:grabbing}

.mm-node{cursor:pointer;transition:filter .15s}
.mm-node:hover .node-shape{filter:brightness(1.2) drop-shadow(0 0 10px rgba(56,189,248,.3))}
.mm-edge{fill:none}

#info-panel{
  position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
  background:var(--toolbar-bg);backdrop-filter:blur(16px);
  border:1px solid var(--border);border-radius:9px;padding:6px 16px;
  font-size:11px;color:var(--text-dim);pointer-events:none;opacity:.7;
}

#loader{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:999}
.spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

#minimap{
  position:fixed;bottom:46px;right:14px;width:170px;height:110px;
  background:var(--surface);border:1px solid var(--border);border-radius:9px;
  overflow:hidden;opacity:.65;transition:opacity .2s;
}
#minimap:hover{opacity:1}
#minimap-viewport{position:absolute;border:1.5px solid var(--accent);border-radius:2px;pointer-events:none}

#editor-panel{
  position:fixed;top:48px;right:0;bottom:0;width:520px;max-width:92vw;
  background:var(--surface);border-left:1px solid var(--border);
  transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
  z-index:90;display:flex;flex-direction:column;
}
#editor-panel.open{transform:translateX(0)}
.editor-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.editor-header h2{font-size:13px;font-weight:600}
.editor-actions{display:flex;gap:5px}
.ed-btn{
  padding:4px 10px;border-radius:6px;border:1px solid var(--border);
  background:var(--bg2);color:var(--text);font-size:11px;font-family:inherit;
  cursor:pointer;font-weight:500;transition:all .15s;
}
.ed-btn:hover{border-color:var(--accent);color:var(--accent)}
.ed-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.ed-btn.primary:hover{opacity:.85}
#editor-textarea{
  flex:1;resize:none;border:none;outline:none;padding:12px 14px;
  font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.55;
  background:var(--bg);color:var(--text);tab-size:2;
}
#editor-status{
  padding:7px 14px;font-size:11px;font-family:'JetBrains Mono',monospace;
  border-top:1px solid var(--border);flex-shrink:0;min-height:30px;color:var(--text-dim);
}
#editor-status.error{color:#f87171}
#editor-status.success{color:#34d399}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<div id="loader"><div class="spinner"></div></div>

<div id="toolbar">
  <div class="toolbar-group">
    <h1 id="map-title">MindMap</h1>
    <span class="subtitle" id="map-subtitle"></span>
  </div>
  <div class="toolbar-group">
    <button class="tb-btn" id="btn-expand">

    <div class="theme-toggle" id="theme-toggle" title="Toggle theme"></div>
  </div>
</div>

<div id="editor-panel">
  <div class="editor-header">
    <h2>JSON Data Editor</h2>
    <div class="editor-actions">
      <button class="ed-btn" id="ed-format">Format</button>
      <button class="ed-btn" id="ed-download">Download</button>
      <button class="ed-btn" id="ed-load-file">Load File</button>
      <button class="ed-btn primary" id="ed-apply">Apply</button>
    </div>
  </div>
  <textarea id="editor-textarea" spellcheck="false" placeholder="Paste or edit your mindmap JSON here..."></textarea>
  <div id="editor-status">Ready</div>
  <input type="file" id="ed-file-input" accept=".json" style="display:none">
</div>

<div id="canvas-wrap">
  <svg id="mindmap-svg" xmlns="http://www.w3.org/2000/svg"></svg>
</div>

<div id="minimap"><div id="minimap-viewport"></div></div>
<div id="info-panel">Scroll to zoom · Click nodes to collapse · Drag to pan · 0 = fit</div>

<script>
// ═══════════════════════════════════════════════════════════════════
//  EMBEDDED FALLBACK DATA
// ═══════════════════════════════════════════════════════════════════
const FALLBACK_DATA = {"meta":{"title":"IAM Strategy Overview","description":"Identity & Access Management Strategic Mindmap","author":"Hany","version":"1.0","layout":"radial","defaultNodeStyle":{"shape":"roundedRect","bgColor":"#1a1a2e","textColor":"#e0e0e0","borderColor":"#3a3a5c","borderWidth":2,"fontSize":13},"defaultEdgeStyle":{"color":"#4a4a6a","width":2,"style":"curved"}},"root":{"id":"root","content":"<b>IAM Strategy</b><br><small>2025–2030</small>","style":{"shape":"circle","bgColor":"#0f3460","textColor":"#ffffff","borderColor":"#e94560","borderWidth":3,"fontSize":16},"collapsed":false,"children":[{"id":"iga","content":"<img src='https://cdn.jsdelivr.net/npm/lucide-static@0.263.1/icons/shield-check.svg' width='18' height='18' style='filter:invert(1);vertical-align:middle;margin-right:6px;'><b>Identity Governance</b><br><small>IGA &amp; Lifecycle</small>","style":{"shape":"roundedRect","bgColor":"#1b4332","textColor":"#d8f3dc","borderColor":"#52b788","borderWidth":2},"children":[{"id":"iga-saviynt","content":"<b>Saviynt</b><br>Cloud IGA Platform","style":{"shape":"roundedRect","bgColor":"#2d6a4f","textColor":"#ffffff","borderColor":"#74c69d"},"children":[{"id":"iga-saviynt-sod","content":"SoD Controls<br><small>Segregation of Duties</small>","style":{"shape":"pill","bgColor":"#40916c","textColor":"#fff","borderColor":"#95d5b2"},"children":[]},{"id":"iga-saviynt-lc","content":"Lifecycle Mgmt<br><small>Joiner/Mover/Leaver</small>","style":{"shape":"pill","bgColor":"#40916c","textColor":"#fff","borderColor":"#95d5b2"},"children":[]}]},{"id":"iga-certifications","content":"<b>Access Reviews</b><br>Periodic Certifications","style":{"shape":"roundedRect","bgColor":"#2d6a4f","textColor":"#ffffff","borderColor":"#74c69d"},"children":[]}]},{"id":"pam","content":"<img src='https://cdn.jsdelivr.net/npm/lucide-static@0.263.1/icons/lock.svg' width='18' height='18' style='filter:invert(1);vertical-align:middle;margin-right:6px;'><b>Privileged Access</b><br><small>PAM &amp; Vaulting</small>","style":{"shape":"roundedRect","bgColor":"#3c1642","textColor":"#f2e9f3","borderColor":"#c77dff","borderWidth":2},"children":[{"id":"pam-cyberark","content":"<b>CyberArk</b><br>Self-Hosted v14","style":{"shape":"roundedRect","bgColor":"#5a189a","textColor":"#ffffff","borderColor":"#9d4edd"},"children":[{"id":"pam-cyberark-vault","content":"Credential Vaulting","style":{"shape":"pill","bgColor":"#7b2cbf","textColor":"#fff","borderColor":"#c77dff"},"children":[]},{"id":"pam-cyberark-psr","content":"Session Recording<br><small>PSM &amp; HTML5 GW</small>","style":{"shape":"pill","bgColor":"#7b2cbf","textColor":"#fff","borderColor":"#c77dff"},"children":[]}]},{"id":"pam-jit","content":"<b>JIT Access</b><br>Zero Standing Privilege","style":{"shape":"diamond","bgColor":"#5a189a","textColor":"#ffffff","borderColor":"#e0aaff"},"children":[]}]},{"id":"ciam","content":"<img src='https://cdn.jsdelivr.net/npm/lucide-static@0.263.1/icons/users.svg' width='18' height='18' style='filter:invert(1);vertical-align:middle;margin-right:6px;'><b>Customer IAM</b><br><small>CIAM &amp; Digital ID</small>","style":{"shape":"roundedRect","bgColor":"#003049","textColor":"#eae2b7","borderColor":"#fcbf49","borderWidth":2},"children":[{"id":"ciam-nafath","content":"<b>Nafath</b><br>National SSO (KSA)","style":{"shape":"roundedRect","bgColor":"#005f73","textColor":"#ffffff","borderColor":"#94d2bd"},"children":[]},{"id":"ciam-maturity","content":"<b>CIAM Maturity</b><br><small>6 Domains · 31 Capabilities</small>","style":{"shape":"hexagon","bgColor":"#005f73","textColor":"#ffffff","borderColor":"#e9d8a6"},"children":[]}]},{"id":"compliance","content":"<img src='https://cdn.jsdelivr.net/npm/lucide-static@0.263.1/icons/file-text.svg' width='18' height='18' style='filter:invert(1);vertical-align:middle;margin-right:6px;'><b>Regulatory</b><br><small>Compliance &amp; Privacy</small>","style":{"shape":"roundedRect","bgColor":"#6b2737","textColor":"#fcd5ce","borderColor":"#e76f51","borderWidth":2},"children":[{"id":"comp-pdpl","content":"<b>PDPL</b><br>Saudi Data Protection","style":{"shape":"roundedRect","bgColor":"#9b2226","textColor":"#ffffff","borderColor":"#ee9b00"},"children":[]},{"id":"comp-sama","content":"<b>SAMA CSF</b><br>Financial Sector","style":{"shape":"roundedRect","bgColor":"#9b2226","textColor":"#ffffff","borderColor":"#ee9b00"},"children":[]},{"id":"comp-nist","content":"<b>NIST</b> · <b>GDPR</b><br><small>International Frameworks</small>","style":{"shape":"pill","bgColor":"#ae2012","textColor":"#ffffff","borderColor":"#ca6702"},"children":[]}]},{"id":"cloud","content":"<img src='https://cdn.jsdelivr.net/npm/lucide-static@0.263.1/icons/cloud.svg' width='18' height='18' style='filter:invert(1);vertical-align:middle;margin-right:6px;'><b>Cloud Identity</b><br><small>Entra ID &amp; Azure</small>","style":{"shape":"roundedRect","bgColor":"#0a1628","textColor":"#caf0f8","borderColor":"#00b4d8","borderWidth":2},"children":[{"id":"cloud-entra","content":"<b>Microsoft Entra ID</b><br>Hybrid Identity","style":{"shape":"roundedRect","bgColor":"#023e8a","textColor":"#ffffff","borderColor":"#48cae4"},"children":[]},{"id":"cloud-cond","content":"<b>Conditional Access</b><br>Zero Trust Policies","style":{"shape":"diamond","bgColor":"#0077b6","textColor":"#ffffff","borderColor":"#90e0ef"},"children":[]}]}]}};

// ═══════════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════════
let mapData = null, nodes = [], edges = [], nodeMap = {};
let pan = {x:0,y:0}, zoom = 1, dragging = false, dragStart = {x:0,y:0};
const SVG  = document.getElementById('mindmap-svg');
const WRAP = document.getElementById('canvas-wrap');
const NS   = 'http://www.w3.org/2000/svg';

// ── Theme ──────────────────────────────────────────────────────────
function detectTheme(){const s=localStorage.getItem('mm-theme');return s||( matchMedia('(prefers-color-scheme:light)').matches?'light':'dark')}
function applyTheme(t){document.documentElement.setAttribute('data-theme',t);localStorage.setItem('mm-theme',t)}
applyTheme(detectTheme());
document.getElementById('theme-toggle').addEventListener('click',()=>{
  applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');
});

// ── Load data ──────────────────────────────────────────────────────
async function loadData(){
  let data = null;
  if(location.protocol !== 'file:'){
    try{ const r = await fetch('data.json'); if(r.ok) data = await r.json(); }
    catch(e){}
  }
  mapData = data || FALLBACK_DATA;
  applyMapData();
  document.getElementById('loader').style.display = 'none';
  document.getElementById('editor-textarea').value = JSON.stringify(mapData,null,2);
  if(!data) toggleEditor(true);
}

function applyMapData(){
  document.getElementById('map-title').textContent   = mapData.meta?.title       || 'MindMap';
  document.getElementById('map-subtitle').textContent = mapData.meta?.description || '';
  document.title = mapData.meta?.title || 'MindMap';
  buildGraph();
  layout();
  render();
  fitToScreen();
}

// ═══════════════════════════════════════════════════════════════════
//  GRAPH BUILD
// ═══════════════════════════════════════════════════════════════════
function buildGraph(){
  nodes = []; edges = []; nodeMap = {};
  const dStyle = mapData.meta?.defaultNodeStyle || {};
  const eStyle = mapData.meta?.defaultEdgeStyle || {};
  function walk(n, parent, depth){
    // Deduplicate IDs: if already seen, append a suffix
    let rawId = n.id || ('n' + nodes.length);
    let id = rawId;
    let suffix = 2;
    while(nodeMap[id]) id = rawId + '_' + (suffix++);

    // Style cascade: defaultNodeStyle → parent's resolved style → this node's explicit style
    // This means children inherit every property from their parent unless they override it.
    const parentStyle = parent ? parent.style : dStyle;
    const node = {
      id,
      content : n.content || '',
      style   : {...dStyle, ...parentStyle, ...(n.style||{})},
      collapsed: !!n.collapsed,
      children : [],
      parent  : parent ? parent.id : null,
      depth,
      x:0, y:0, w:0, h:0,
      _outAngle: 0
    };
    nodes.push(node);
    nodeMap[node.id] = node;
    if(parent){
      parent.children.push(node.id);
      edges.push({from: parent.id, to: node.id, style: eStyle});
    }
    (n.children||[]).forEach(c => walk(c, node, depth+1));
  }
  walk(mapData.root, null, 0);
}

// ═══════════════════════════════════════════════════════════════════
//  MEASURE NODES
// ═══════════════════════════════════════════════════════════════════
function measureNodes(){
  let el = document.getElementById('mm-measurer');
  if(!el){
    el = document.createElement('div');
    el.id = 'mm-measurer';
    el.style.cssText = 'position:absolute;visibility:hidden;pointer-events:none;top:-9999px;left:-9999px;font-family:"DM Sans",sans-serif;';
    document.body.appendChild(el);
  }
  nodes.forEach(n=>{
    const fs = n.style.fontSize || 13;
    el.style.fontSize   = fs + 'px';
    el.style.maxWidth   = '220px';
    el.style.padding    = '10px 16px';
    el.style.lineHeight = '1.45';
    el.innerHTML = n.content;
    const r = el.getBoundingClientRect();
    n.w = Math.max(r.width + 8, 60);
    n.h = Math.max(r.height + 4, 36);
    const s = n.style.shape || 'roundedRect';
    if(s === 'circle'){
      const d = Math.max(n.w, n.h); n.w = d; n.h = d;
    } else if(s === 'diamond'){
      n.w *= 1.45; n.h *= 1.45;
    } else if(s === 'hexagon' || s === 'parallelogram' || s === 'trapezoid'){
      n.w *= 1.25;
    } else if(s === 'shield' || s === 'cloud'){
      n.w *= 1.2; n.h *= 1.3;
    } else if(s === 'star'){
      const d = Math.max(n.w, n.h) * 1.1; n.w = d; n.h = d;
    }
    if(n.style.width)  n.w = n.style.width;
    if(n.style.height) n.h = n.style.height;
  });
}

// ═══════════════════════════════════════════════════════════════════
//  VISIBILITY
// ═══════════════════════════════════════════════════════════════════
function isVisible(node){
  if(!node.parent) return true;
  const p = nodeMap[node.parent];
  return !p.collapsed && isVisible(p);
}

function visKids(n){
  if(n.collapsed) return [];
  return n.children.map(id => nodeMap[id]).filter(Boolean);
}

// ═══════════════════════════════════════════════════════════════════
//  RADIAL LAYOUT — bottom-up minimum-arc guarantees no overlap
//
//  Key invariant: every node's assigned angular sector produces an
//  arc-length (sector_angle × ring_radius) ≥ the node's tangential
//  size AND ≥ the combined arc needed by all its descendants at their
//  respective rings.  This is achieved by:
//
//  1. Depth-uniform ring radii (all nodes at depth d share ringR[d]).
//  2. minArc(n) computed bottom-up:
//       leaf  → max(w,h) + NODE_GAP
//       inner → max(selfSize, Σchildren_minArc × r_self/r_child)
//     The scaling r_self/r_child < 1 shrinks the required arc at the
//     parent level because children sit on a larger ring with more
//     circumferential room per radian.
//  3. Rings scaled up if the root's children don't fit in 2π.
//  4. Top-down sector assignment proportional to minArc.
// ═══════════════════════════════════════════════════════════════════
function layout(){
  measureNodes();
  if(!nodes.length) return;

  const root = nodes[0];
  root.x = 0; root.y = 0; root._outAngle = 0;

  const NODE_GAP = 22;   // minimum tangential gap between sibling bounding boxes (px)
  const RING_GAP = 60;   // minimum radial gap between parent edge and child edge (px)

  const rootKids = visKids(root);
  if(!rootKids.length) return;

  // ── 1. Depth-indexed ring radii ─────────────────────────────────
  const maxDepth = nodes.reduce((m, n) => Math.max(m, n.depth), 0);

  // halfSz[d] = half of the largest node dimension at depth d
  // (conservative: we use max(w,h)/2 since we don't know radial orientation yet)
  const halfSz = new Float64Array(maxDepth + 1);
  nodes.forEach(n => {
    halfSz[n.depth] = Math.max(halfSz[n.depth], Math.max(n.w, n.h) / 2);
  });

  const ringR = new Float64Array(maxDepth + 1); // ringR[0] = 0 (root at center)
  for(let d = 1; d <= maxDepth; d++){
    ringR[d] = ringR[d-1] + halfSz[d-1] + RING_GAP + halfSz[d];
  }

  // ── 2. Minimum arc (bottom-up) ───────────────────────────────────
  // minArc(n) = minimum arc-length in the tangential direction that
  // node n's subtree needs when n sits on ring ringR[n.depth].
  const _arc = Object.create(null);

  function minArc(n){
    if(_arc[n.id] !== undefined) return _arc[n.id];

    const selfSize = Math.max(n.w, n.h) + NODE_GAP;
    const ch = visKids(n);
    if(!ch.length) return (_arc[n.id] = selfSize);

    const r  = ringR[n.depth];
    const rc = ringR[n.depth + 1] || (r + halfSz[n.depth] + RING_GAP + 60);

    // Total arc needed at the child ring level
    const childTotal = ch.reduce((s, c) => s + minArc(c), 0)
                     + (ch.length - 1) * NODE_GAP;

    // Same sector angle θ → arc at parent = θ·r, arc at child = θ·rc.
    // We need θ·rc ≥ childTotal, so the equivalent arc at parent = childTotal·(r/rc).
    const childArcAtSelf = rc > 0 ? childTotal * (r / rc) : childTotal;

    return (_arc[n.id] = Math.max(selfSize, childArcAtSelf));
  }

  // ── 3. Scale rings up if root's children don't fit in 2π ────────
  const rootChildArcs = rootKids.reduce((s, c) => s + minArc(c), 0)
                      + (rootKids.length - 1) * NODE_GAP;
  const minR1 = rootChildArcs / (2 * Math.PI);  // radius needed so 2π·r1 ≥ total

  if(ringR[1] < minR1){
    const scale = minR1 / ringR[1];
    for(let d = 1; d <= maxDepth; d++) ringR[d] *= scale;
    // Proportional scaling keeps r/rc ratios identical → minArc values unchanged
  }

  // ── 4. Top-down sector placement ────────────────────────────────
  function place(n, a0, a1){
    const mid = (a0 + a1) / 2;
    const r   = ringR[n.depth];
    n.x = Math.cos(mid) * r;
    n.y = Math.sin(mid) * r;
    n._outAngle = mid;

    const ch = visKids(n);
    if(!ch.length) return;

    const rc       = ringR[n.depth + 1] || (r + halfSz[n.depth] + RING_GAP + 60);
    const avail    = a1 - a0;
    const angGap   = NODE_GAP / rc;

    // Each child's minimum angle at the child ring
    const childAngs   = ch.map(c => minArc(c) / rc);
    const sumChildAngs = childAngs.reduce((s, x) => s + x, 0);
    const gapTotal    = angGap * (ch.length - 1);
    const totalNeeded = sumChildAngs + gapTotal;

    let childScale, start;
    if(totalNeeded <= avail){
      // More space than needed: scale children proportionally, keep gaps fixed
      childScale = (avail - gapTotal) / Math.max(sumChildAngs, 1e-9);
      // Center the group within the parent sector
      const usedAngle = sumChildAngs * childScale + gapTotal;
      start = a0 + (avail - usedAngle) / 2;
    } else {
      // Tight: scale everything proportionally to fit
      childScale = avail / Math.max(totalNeeded, 1e-9);
      start = a0;
    }

    let cur = start;
    const gapUsed = totalNeeded <= avail ? angGap : angGap * childScale;
    ch.forEach((c, i) => {
      const ang = childAngs[i] * childScale;
      place(c, cur, cur + ang);
      cur += ang + gapUsed;
    });
  }

  // Place root's children across the full circle
  {
    const rc        = ringR[1];
    const angGap    = NODE_GAP / rc;
    const childAngs = rootKids.map(c => minArc(c) / rc);
    const sumAngs   = childAngs.reduce((s, x) => s + x, 0);
    const gapTotal  = angGap * (rootKids.length - 1);
    const totalAng  = sumAngs + gapTotal;

    // Scale so children fill (but do not exceed) the full circle
    const scale   = Math.min((2 * Math.PI - gapTotal) / Math.max(sumAngs, 1e-9),
                             2 * Math.PI / Math.max(totalAng, 1e-9));
    const usedAng = sumAngs * scale + gapTotal;
    let cur = -usedAng / 2;   // center the ring symmetrically

    const gapUsed = totalAng <= 2 * Math.PI ? angGap : angGap * scale;
    rootKids.forEach((c, i) => {
      const ang = childAngs[i] * scale;
      place(c, cur, cur + ang);
      cur += ang + gapUsed;
    });
  }
}

// ═══════════════════════════════════════════════════════════════════
//  SHAPE PATHS (centered at 0,0)
// ═══════════════════════════════════════════════════════════════════
function shapePath(n){
  const x=-n.w/2, y=-n.h/2, w=n.w, h=n.h, r=10;
  const s = n.style.shape || 'roundedRect';
  if(s==='custom' && n.style.customPath) return n.style.customPath;
  if(s==='circle'){
    const rad=Math.max(w,h)/2;
    return `M${rad},0A${rad},${rad},0,1,1,${-rad},0A${rad},${rad},0,1,1,${rad},0Z`;
  }
  if(s==='pill'){
    const rad=h/2;
    return `M${x+rad},${y}L${x+w-rad},${y}A${rad},${rad},0,0,1,${x+w-rad},${y+h}L${x+rad},${y+h}A${rad},${rad},0,0,1,${x+rad},${y}Z`;
  }
  if(s==='diamond'){
    return `M0,${y}L${x+w},0L0,${y+h}L${x},0Z`;
  }
  if(s==='hexagon'){
    const hw=w/2,hh=h/2,ins=w*0.22;
    return `M${-hw+ins},${-hh}L${hw-ins},${-hh}L${hw},0L${hw-ins},${hh}L${-hw+ins},${hh}L${-hw},0Z`;
  }
  if(s==='octagon'){
    const hw=w/2,hh=h/2,c=Math.min(w,h)*0.28;
    return `M${-hw+c},${-hh}L${hw-c},${-hh}L${hw},${-hh+c}L${hw},${hh-c}L${hw-c},${hh}L${-hw+c},${hh}L${-hw},${hh-c}L${-hw},${-hh+c}Z`;
  }
  if(s==='parallelogram'){
    const sk=w*0.18;
    return `M${x+sk},${y}L${x+w},${y}L${x+w-sk},${y+h}L${x},${y+h}Z`;
  }
  if(s==='trapezoid'){
    const ins=w*0.15;
    return `M${x+ins},${y}L${x+w-ins},${y}L${x+w},${y+h}L${x},${y+h}Z`;
  }
  if(s==='star'){
    const or=Math.max(w,h)/2, ir=or*0.42, pts=5;
    let d='';
    for(let i=0;i<pts*2;i++){
      const a=-Math.PI/2+i*Math.PI/pts;
      const rad=i%2===0?or:ir;
      d+=(i===0?'M':'L')+(Math.cos(a)*rad)+','+(Math.sin(a)*rad);
    }
    return d+'Z';
  }
  if(s==='shield'){
    const hw=w/2,hh=h/2;
    return `M0,${-hh}Q${hw},${-hh},${hw},${-hh*0.3}L${hw},${hh*0.15}Q${hw},${hh*0.7},0,${hh}Q${-hw},${hh*0.7},${-hw},${hh*0.15}L${-hw},${-hh*0.3}Q${-hw},${-hh},0,${-hh}Z`;
  }
  if(s==='cloud'){
    const hw=w/2,hh=h/2;
    return `M${-hw*0.5},${hh*0.4}Q${-hw},${hh*0.4},${-hw},0Q${-hw},${-hh*0.6},${-hw*0.55},${-hh*0.7}Q${-hw*0.35},${-hh},0,${-hh}Q${hw*0.4},${-hh},${hw*0.55},${-hh*0.65}Q${hw},${-hh*0.5},${hw},0Q${hw},${hh*0.4},${hw*0.5},${hh*0.4}Z`;
  }
  // roundedRect (default)
  return `M${x+r},${y}L${x+w-r},${y}Q${x+w},${y},${x+w},${y+r}L${x+w},${y+h-r}Q${x+w},${y+h},${x+w-r},${y+h}L${x+r},${y+h}Q${x},${y+h},${x},${y+h-r}L${x},${y+r}Q${x},${y},${x+r},${y}Z`;
}

// ═══════════════════════════════════════════════════════════════════
//  EDGE ROUTING — center-to-center bezier, outward control points
//
//  Edges always originate and terminate at the node's geometric
//  center so the line is never "floating" for non-convex shapes
//  (shields, clouds, stars, etc.).  Control points push outward
//  along the radial direction to create a natural arcing curve.
// ═══════════════════════════════════════════════════════════════════
function edgePath(n1, n2){
  // Outward direction from root for the parent node
  const outAngle = n1.depth === 0
    ? Math.atan2(n2.y - n1.y, n2.x - n1.x)
    : n1._outAngle;

  const dx   = n2.x - n1.x, dy = n2.y - n1.y;
  const dist = Math.sqrt(dx*dx + dy*dy) || 1;
  const cp   = dist * 0.42;

  const ox = Math.cos(outAngle), oy = Math.sin(outAngle);

  // c1: depart parent center heading radially outward
  const c1x = n1.x + ox * cp;
  const c1y = n1.y + oy * cp;

  // c2: arrive at child center from its inward (root-facing) side
  const inAngle = n2._outAngle + Math.PI;
  const c2x = n2.x + Math.cos(inAngle) * cp * 0.65;
  const c2y = n2.y + Math.sin(inAngle) * cp * 0.65;

  return `M${n1.x},${n1.y}C${c1x},${c1y},${c2x},${c2y},${n2.x},${n2.y}`;
}

// ═══════════════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════════════
let vbX=0, vbY=0;

function render(){
  SVG.innerHTML = '';

  // Compute bounding box of all visible nodes
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  nodes.forEach(n=>{
    if(n.depth>0 && !isVisible(n)) return;
    minX=Math.min(minX, n.x-n.w/2);
    minY=Math.min(minY, n.y-n.h/2);
    maxX=Math.max(maxX, n.x+n.w/2);
    maxY=Math.max(maxY, n.y+n.h/2);
  });
  const pad=90;
  minX-=pad; minY-=pad; maxX+=pad; maxY+=pad;
  vbX=minX; vbY=minY;
  const svgW=maxX-minX, svgH=maxY-minY;
  SVG.setAttribute('width',  svgW);
  SVG.setAttribute('height', svgH);
  SVG.setAttribute('viewBox',`${minX} ${minY} ${svgW} ${svgH}`);

  // Defs
  const defs = document.createElementNS(NS,'defs');
  defs.innerHTML = `<filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="4" result="g"/>
    <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>`;
  SVG.appendChild(defs);

  // ── Edges (drawn first, under nodes) ──
  const edgeG = document.createElementNS(NS,'g');
  edgeG.setAttribute('class','edges');
  edges.forEach(e=>{
    const n1 = nodeMap[e.from], n2 = nodeMap[e.to];
    if(!isVisible(n2)) return;
    const path = document.createElementNS(NS,'path');
    path.setAttribute('class','mm-edge');
    path.setAttribute('d', edgePath(n1,n2));
    path.setAttribute('stroke', e.style.color || '#4a4a6a');
    path.setAttribute('stroke-width', e.style.width || 2);
    path.setAttribute('stroke-linecap','round');
    path.setAttribute('stroke-linejoin','round');
    path.setAttribute('opacity','0.7');
    edgeG.appendChild(path);
  });
  SVG.appendChild(edgeG);

  // ── Nodes ──
  const nodeG = document.createElementNS(NS,'g');
  nodeG.setAttribute('class','nodes');

  nodes.forEach(n=>{
    if(n.depth>0 && !isVisible(n)) return;

    const g = document.createElementNS(NS,'g');
    g.setAttribute('class','mm-node');
    g.setAttribute('transform',`translate(${n.x},${n.y})`);
    g.setAttribute('data-id', n.id);

    // Shape
    const shapeEl = document.createElementNS(NS,'path');
    shapeEl.setAttribute('class','node-shape');
    shapeEl.setAttribute('d', shapePath(n));
    shapeEl.setAttribute('fill',   n.style.bgColor     || '#1a1a2e');
    shapeEl.setAttribute('stroke', n.style.borderColor || '#3a3a5c');
    shapeEl.setAttribute('stroke-width', n.style.borderWidth || 2);
    g.appendChild(shapeEl);

    // Content via foreignObject
    const sh = n.style.shape || 'roundedRect';
    const tight = ['diamond','star','shield','cloud'].includes(sh);
    const foW = tight ? n.w*0.6 : n.w-8;
    const foH = tight ? n.h*0.55 : n.h-4;
    const fo = document.createElementNS(NS,'foreignObject');
    fo.setAttribute('x', -foW/2); fo.setAttribute('y', -foH/2);
    fo.setAttribute('width', foW); fo.setAttribute('height', foH);
    const div = document.createElement('div');
    div.setAttribute('xmlns','http://www.w3.org/1999/xhtml');
    div.style.cssText = `width:100%;height:100%;display:flex;align-items:center;justify-content:center;text-align:center;font-family:'DM Sans',sans-serif;font-size:${n.style.fontSize||13}px;color:${n.style.textColor||'#e0e0e0'};line-height:1.45;overflow:hidden;word-break:break-word;`;
    div.innerHTML = `<div style="display:block">${n.content}</div>`;
    fo.appendChild(div);
    g.appendChild(fo);

    // Collapse badge — shown only when node has children and is collapsed
    if(n.children.length > 0){
      const badge = document.createElementNS(NS,'g');
      badge.setAttribute('class','collapse-badge');
      // Position badge at top-right of node
      const bx = n.w/2 - 2, by = -n.h/2 + 2;
      const bc = document.createElementNS(NS,'circle');
      bc.setAttribute('cx', bx); bc.setAttribute('cy', by);
      bc.setAttribute('r', 9);
      bc.setAttribute('fill', n.collapsed ? '#e94560' : (n.style.borderColor||'#3a3a5c'));
      bc.setAttribute('stroke','var(--bg)');
      bc.setAttribute('stroke-width','1.5');
      badge.appendChild(bc);
      const bt = document.createElementNS(NS,'text');
      bt.setAttribute('x', bx); bt.setAttribute('y', by + 4);
      bt.setAttribute('text-anchor','middle');
      bt.setAttribute('fill','#fff');
      bt.setAttribute('font-size','9');
      bt.setAttribute('font-family','DM Sans,sans-serif');
      bt.setAttribute('font-weight','600');
      bt.textContent = n.collapsed ? ('+'+countDescendants(n.id)) : '−';
      badge.appendChild(bt);
      g.appendChild(badge);
    }

    // Click: toggle collapse
    g.addEventListener('click', ev=>{
      ev.stopPropagation();
      if(!n.children.length) return;
      if(n.collapsed){
        n.collapsed = false;
        // Expand one level; keep grandchildren collapsed if they were
        n.children.forEach(cid=>{
          const c = nodeMap[cid];
          if(c.children.length) c.collapsed = true;
        });
      } else {
        n.collapsed = true;
      }
      relayoutFrom(n);
    });

    nodeG.appendChild(g);
  });
  SVG.appendChild(nodeG);

  renderMinimap();
}

function countDescendants(id){
  let c = 0;
  function w(nid){ nodeMap[nid].children.forEach(cid=>{ c++; w(cid); }); }
  w(id);
  return c;
}

// ═══════════════════════════════════════════════════════════════════
//  PAN / ZOOM
// ═══════════════════════════════════════════════════════════════════
function updateTransform(){
  SVG.style.transform = `translate(${pan.x}px,${pan.y}px) scale(${zoom})`;
}

WRAP.addEventListener('pointerdown', e=>{
  if(e.target.closest('.mm-node')) return;
  dragging=true;
  dragStart = {x: e.clientX-pan.x, y: e.clientY-pan.y};
  SVG.classList.add('grabbing');
  WRAP.setPointerCapture(e.pointerId);
});
WRAP.addEventListener('pointermove', e=>{
  if(!dragging) return;
  pan.x = e.clientX - dragStart.x;
  pan.y = e.clientY - dragStart.y;
  updateTransform(); renderMinimap();
});
WRAP.addEventListener('pointerup', ()=>{ dragging=false; SVG.classList.remove('grabbing'); });

WRAP.addEventListener('wheel', e=>{
  e.preventDefault();
  const rect = WRAP.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const oldZ = zoom;
  zoom = Math.min(Math.max(zoom * (e.deltaY>0?0.9:1.1), 0.08), 6);
  pan.x = mx - (mx-pan.x)*(zoom/oldZ);
  pan.y = my - (my-pan.y)*(zoom/oldZ);
  updateTransform(); renderMinimap();
},{passive:false});

// Pinch zoom
let _pinch = null;
WRAP.addEventListener('touchstart', e=>{
  if(e.touches.length===2) _pinch = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
},{passive:true});
WRAP.addEventListener('touchmove', e=>{
  if(e.touches.length===2 && _pinch){
    const d = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    zoom = Math.min(Math.max(zoom*(d/_pinch), 0.08), 6);
    _pinch = d; updateTransform(); renderMinimap();
  }
},{passive:true});
WRAP.addEventListener('touchend', ()=>{ _pinch=null; });

function fitToScreen(){
  const ww = WRAP.clientWidth, wh = WRAP.clientHeight;
  const sw = parseFloat(SVG.getAttribute('width'))  || 1;
  const sh = parseFloat(SVG.getAttribute('height')) || 1;
  zoom  = Math.min(ww/sw, wh/sh, 1.5) * 0.92;
  pan.x = (ww - sw*zoom)/2;
  pan.y = (wh - sh*zoom)/2;
  updateTransform(); renderMinimap();
}

// ═══════════════════════════════════════════════════════════════════
//  MINIMAP
// ═══════════════════════════════════════════════════════════════════
function renderMinimap(){
  const mm  = document.getElementById('minimap');
  const vp  = document.getElementById('minimap-viewport');
  const sw  = parseFloat(SVG.getAttribute('width'))  || 1;
  const sh  = parseFloat(SVG.getAttribute('height')) || 1;
  const mmW = mm.clientWidth, mmH = mm.clientHeight;
  const sc  = Math.min(mmW/sw, mmH/sh) * 0.92;
  const ww  = WRAP.clientWidth, wh = WRAP.clientHeight;
  vp.style.width  = (ww/zoom)*sc + 'px';
  vp.style.height = (wh/zoom)*sc + 'px';
  vp.style.left   = (-pan.x/zoom)*sc + (mmW-sw*sc)/2 + 'px';
  vp.style.top    = (-pan.y/zoom)*sc + (mmH-sh*sc)/2 + 'px';
}

// ── Relayout preserving view anchor ──
function relayoutFrom(anchor){
  layout(); render();
  if(anchor){
    const ww = WRAP.clientWidth, wh = WRAP.clientHeight;
    pan.x = ww/2 - (anchor.x-vbX)*zoom;
    pan.y = wh/2 - (anchor.y-vbY)*zoom;
  }
  updateTransform(); renderMinimap();
}

// ── Toolbar ──
document.getElementById('btn-expand').addEventListener('click',()=>{
  nodes.forEach(n=>n.collapsed=false); relayoutFrom(nodes[0]);
});
document.getElementById('btn-collapse').addEventListener('click',()=>{
  nodes.forEach(n=>{ if(n.depth>0 && n.children.length) n.collapsed=true; }); relayoutFrom(nodes[0]);
});
document.getElementById('btn-fit').addEventListener('click', fitToScreen);

document.addEventListener('keydown', e=>{
  if(e.target.tagName==='TEXTAREA') return;
  if(e.key==='='||e.key==='+'){zoom=Math.min(zoom*1.15,6);updateTransform();renderMinimap();}
  if(e.key==='-'){zoom=Math.max(zoom/1.15,0.08);updateTransform();renderMinimap();}
  if(e.key==='0') fitToScreen();
});

window.addEventListener('resize', renderMinimap);

// ═══════════════════════════════════════════════════════════════════
//  SVG TEXT CONVERSION (for raster/vector export)
// ═══════════════════════════════════════════════════════════════════
function extractStyleProp(str, prop){
  if(!str) return null;
  const m = str.match(new RegExp(prop+'\\s*:\\s*([^;]+)','i'));
  return m ? m[1].trim() : null;
}

function foToText(svgClone){
  svgClone.querySelectorAll('foreignObject').forEach(fo=>{
    const g  = fo.parentNode;
    const nd = nodeMap[g.getAttribute('data-id')];
    const fs = nd ? (nd.style.fontSize||13) : 13;
    const fc = nd ? (nd.style.textColor||'#e0e0e0') : '#e0e0e0';
    const html  = fo.innerHTML;
    const lines = html.replace(/<div[^>]*>/gi,'').replace(/<\/div>/gi,'').split(/<br\s*\/?>/gi);
    const textEl = document.createElementNS(NS,'text');
    textEl.setAttribute('text-anchor','middle');
    textEl.setAttribute('dominant-baseline','central');
    textEl.setAttribute('fill', fc);
    textEl.setAttribute('font-family','DM Sans,sans-serif');
    textEl.setAttribute('font-size', fs);
    const lh = fs * 1.45;
    const startY = -(lines.length-1)*lh/2;
    lines.forEach((line,li)=>{
      const clean = line.replace(/<img[^>]*>/gi,'').trim();
      if(!clean) return;
      const segRe = /<(b|strong)([^>]*)>(.*?)<\/\1>|<small([^>]*)>(.*?)<\/small>|<span([^>]*)>(.*?)<\/span>|([^<]+)/gi;
      const parts = [];
      let sm;
      while((sm=segRe.exec(clean))!==null){
        if(sm[1])       parts.push({t:sm[3].replace(/<[^>]+>/g,''), bold:true, size:null, color:null});
        else if(sm[5]!==undefined) parts.push({t:sm[5].replace(/<[^>]+>/g,''), bold:false, size:Math.round(fs*0.78), color:null});
        else if(sm[7]!==undefined){
          const fw=extractStyleProp(sm[6],'font-weight');
          parts.push({t:sm[7].replace(/<[^>]+>/g,''), bold:fw==='bold'||fw==='700', size:null, color:null});
        }
        else if(sm[8]) parts.push({t:sm[8], bold:false, size:null, color:null});
      }
      const useParts = parts.filter(p=>p.t.trim());
      if(!useParts.length) return;
      let first = true;
      useParts.forEach(p=>{
        const ts = document.createElementNS(NS,'tspan');
        ts.textContent = p.t;
        if(p.bold)  ts.setAttribute('font-weight','700');
        if(p.size)  ts.setAttribute('font-size', p.size);
        if(p.color) ts.setAttribute('fill', p.color);
        if(first){
          ts.setAttribute('x','0');
          ts.setAttribute('dy', li===0 ? startY : lh);
          first = false;
        }
        textEl.appendChild(ts);
      });
    });
    fo.parentNode.replaceChild(textEl, fo);
  });
}

// ═══════════════════════════════════════════════════════════════════
//  SVG EXPORT
// ═══════════════════════════════════════════════════════════════════
document.getElementById('btn-export-svg').addEventListener('click',()=>{
  const clone = SVG.cloneNode(true);
  clone.removeAttribute('style');
  clone.setAttribute('xmlns','http://www.w3.org/2000/svg');
  clone.setAttribute('xmlns:xlink','http://www.w3.org/1999/xlink');
  const bg = document.documentElement.getAttribute('data-theme')==='light'?'#f0f2f7':'#0b0e17';
  const rect = document.createElementNS(NS,'rect');
  rect.setAttribute('width','100%'); rect.setAttribute('height','100%'); rect.setAttribute('fill',bg);
  clone.insertBefore(rect, clone.firstChild);
  foToText(clone);
  dlBlob(new Blob([new XMLSerializer().serializeToString(clone)],{type:'image/svg+xml'}),
    (mapData.meta?.title||'mindmap').replace(/\s+/g,'_')+'.svg');
});

// ═══════════════════════════════════════════════════════════════════
//  PNG EXPORT
// ═══════════════════════════════════════════════════════════════════
document.getElementById('btn-export-png').addEventListener('click',()=>{
  const clone = SVG.cloneNode(true);
  clone.removeAttribute('style');
  clone.setAttribute('xmlns','http://www.w3.org/2000/svg');
  clone.setAttribute('xmlns:xhtml','http://www.w3.org/1999/xhtml');
  const styleEl = document.createElementNS(NS,'style');
  styleEl.textContent = `@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;500;700&display=swap');`;
  clone.insertBefore(styleEl, clone.firstChild);
  clone.querySelectorAll('foreignObject div').forEach(d=>d.setAttribute('xmlns','http://www.w3.org/1999/xhtml'));

  const svgStr = new XMLSerializer().serializeToString(clone);
  const sw = parseFloat(clone.getAttribute('width')), sh = parseFloat(clone.getAttribute('height'));
  const sc = 2;
  const canvas = document.createElement('canvas');
  canvas.width = sw*sc; canvas.height = sh*sc;
  const ctx = canvas.getContext('2d');
  const bg = document.documentElement.getAttribute('data-theme')==='light'?'#f0f2f7':'#0b0e17';
  ctx.fillStyle = bg; ctx.fillRect(0,0,canvas.width,canvas.height);

  const img = new Image();
  const tryFallback = ()=>{
    const c2 = SVG.cloneNode(true);
    c2.removeAttribute('style');
    c2.setAttribute('xmlns','http://www.w3.org/2000/svg');
    foToText(c2);
    const img2 = new Image();
    img2.onload = ()=>{
      ctx.drawImage(img2,0,0,canvas.width,canvas.height);
      canvas.toBlob(b=>dlBlob(b,(mapData.meta?.title||'mindmap').replace(/\s+/g,'_')+'.png'),'image/png');
    };
    img2.src = 'data:image/svg+xml;charset=utf-8,'+encodeURIComponent(new XMLSerializer().serializeToString(c2));
  };
  img.onload = ()=>{
    ctx.drawImage(img,0,0,canvas.width,canvas.height);
    canvas.toBlob(b=>dlBlob(b,(mapData.meta?.title||'mindmap').replace(/\s+/g,'_')+'.png'),'image/png');
  };
  img.onerror = tryFallback;
  img.src = 'data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svgStr);
});

//  PPTX EXPORT
// ═══════════════════════════════════════════════════════════════════
document.getElementById('btn-export-pptx').addEventListener('click', exportPPTX);

function exportPPTX(){
  // Standard PowerPoint Widescreen: 13.33" × 7.5" = 12192000 × 6858000 EMU
  const SLIDE_W = 12192000, SLIDE_H = 6858000;
  const PAD_EMU = 500000;

  const vis = nodes.filter(n => n.depth === 0 || isVisible(n));
  if(!vis.length) return;

  // Bounds of all visible nodes in SVG space
  let mnX=Infinity,mnY=Infinity,mxX=-Infinity,mxY=-Infinity;
  vis.forEach(n=>{
    mnX=Math.min(mnX,n.x-n.w/2); mnY=Math.min(mnY,n.y-n.h/2);
    mxX=Math.max(mxX,n.x+n.w/2); mxY=Math.max(mxY,n.y+n.h/2);
  });
  const svgW=mxX-mnX||1, svgH=mxY-mnY||1;
  const usableW=SLIDE_W-PAD_EMU*2, usableH=SLIDE_H-PAD_EMU*2;
  const sc=Math.min(usableW/svgW, usableH/svgH);
  const offX=PAD_EMU+(usableW-svgW*sc)/2-mnX*sc;
  const offY=PAD_EMU+(usableH-svgH*sc)/2-mnY*sc;

  // Node bounding box in EMU (top-left origin)
  function nodeBox(n){
    return {
      x: Math.round(n.x*sc+offX-n.w*sc/2),
      y: Math.round(n.y*sc+offY-n.h*sc/2),
      w: Math.max(Math.round(n.w*sc), 1),
      h: Math.max(Math.round(n.h*sc), 1)
    };
  }
  // Node center in EMU
  function ctr(n){
    return { x: Math.round(n.x*sc+offX), y: Math.round(n.y*sc+offY) };
  }

  // Normalise any hex colour (3, 6 or 8 chars, with or without #, with or without alpha)
  // to a 6-char uppercase RGB string safe for OOXML.
  function hexRGB(h){
    let c = String(h||'').replace(/[^0-9a-fA-F]/g,'');
    if(c.length===3) c = c[0]+c[0]+c[1]+c[1]+c[2]+c[2];
    if(c.length===8) c = c.slice(0,6);         // strip alpha
    return (c+'000000').slice(0,6).toUpperCase();
  }

  function xe(s){ // XML-escape for element content and attribute values
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
                    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Strip HTML tags AND common HTML entities, leaving plain text
  function plain(s){
    return s.replace(/<br\s*\/?>/gi,' ')
            .replace(/<[^>]+>/g,'')
            .replace(/&amp;/gi,'&').replace(/&lt;/gi,'<').replace(/&gt;/gi,'>')
            .replace(/&nbsp;/gi,' ').replace(/&[a-z]+;/gi,' ')
            .replace(/\s+/g,' ').trim();
  }

  function prstGeom(shape){
    const m={roundedRect:'roundRect',rect:'rect',circle:'ellipse',pill:'roundRect',
             diamond:'diamond',hexagon:'hexagon',octagon:'octagon',
             parallelogram:'parallelogram',trapezoid:'trapezoid',
             star:'star5',shield:'pentagon',cloud:'cloud',custom:'rect'};
    return m[shape]||'roundRect';
  }

  let spId = 10;
  let linesXml  = '';   // drawn first so shapes appear on top
  let shapesXml = '';

  // Pre-assign shape IDs so connectors (p:cxnSp) can reference them
  // via stCxn/endCxn — this is what makes lines follow shapes when moved.
  vis.forEach(n => { n._spId = ++spId; });

  // ── Connectors: p:cxnSp with straightConnector1 ────────────────────
  // stCxn/endCxn bind each connector endpoint to a shape by ID.
  // PowerPoint updates the connector position whenever either shape moves.
  // flipH/flipV map the connector's TL→BR default direction to the actual
  // p1→p2 direction so the bounding box is always correct.
  edges.forEach(e=>{
    const n1=nodeMap[e.from], n2=nodeMap[e.to];
    if(!isVisible(n2)) return;

    const p1=ctr(n1), p2=ctr(n2);
    const strk=hexRGB(e.style.color||'#4a4a6a');
    const bw=Math.max(Math.round((e.style.width||2)*9525), 9525);

    const lx=Math.min(p1.x,p2.x), ly=Math.min(p1.y,p2.y);
    const cw=Math.max(Math.abs(p2.x-p1.x),1);
    const ch=Math.max(Math.abs(p2.y-p1.y),1);
    const fH = p1.x > p2.x ? 'flipH="1" ' : '';
    const fV = p1.y > p2.y ? 'flipV="1" ' : '';

    // Choose the connection-point index on each shape that faces the other.
    // Standard preset shapes: 0=left, 1=top, 2=right, 3=bottom.
    const ang = Math.atan2(p2.y - p1.y, p2.x - p1.x) * 180 / Math.PI;
    function bestIdx(a){
      const d = ((a % 360) + 360) % 360;
      if(d < 45 || d >= 315) return 2;  // E → right
      if(d < 135)            return 3;  // S → bottom
      if(d < 225)            return 0;  // W → left
      return 1;                         // N → top
    }
    const idx1 = bestIdx(ang);        // on n1, pointing toward n2
    const idx2 = bestIdx(ang + 180);  // on n2, pointing back toward n1

    linesXml+=`
  <p:cxnSp>
    <p:nvCxnSpPr>
      <p:cNvPr id="${++spId}" name="conn${spId}"/>
      <p:cNvCxnSpPr>
        <a:stCxn id="${n1._spId}" idx="${idx1}"/>
        <a:endCxn id="${n2._spId}" idx="${idx2}"/>
      </p:cNvCxnSpPr>
      <p:nvPr/>
    </p:nvCxnSpPr>
    <p:spPr>
      <a:xfrm ${fH}${fV}><a:off x="${lx}" y="${ly}"/><a:ext cx="${cw}" cy="${ch}"/></a:xfrm>
      <a:prstGeom prst="straightConnector1"><a:avLst/></a:prstGeom>
      <a:noFill/>
      <a:ln w="${bw}" cap="rnd">
        <a:solidFill><a:srgbClr val="${strk}"/></a:solidFill>
        <a:round/>
      </a:ln>
    </p:spPr>
  </p:cxnSp>`;

    </p:spPr>
    <p:txBody>
      <a:bodyPr anchor="ctr" wrap="square" rtlCol="0"/>
      <a:lstStyle/>
      <a:p>
        <a:pPr algn="ctr"/>
        <a:r>

            <a:solidFill><a:srgbClr val="${txtC}"/></a:solidFill>
          </a:rPr>
          <a:t>${lbl}</a:t>
        </a:r>
      </a:p>
    </p:txBody>
  </p:sp>`;
  });

      <p:nvGrpSpPr><p:cNvPr id="1" name=""/><p:cNvGrpSpPr/><p:nvPr/></p:nvGrpSpPr>
      <p:grpSpPr><a:xfrm><a:off x="0" y="0"/><a:ext cx="0" cy="0"/>
      <a:chOff x="0" y="0"/><a:chExt cx="0" cy="0"/></a:xfrm></p:grpSpPr>
    </p:spTree>
  </p:cSld>
  <p:clrMapOvr><a:masterClrMapping/></p:clrMapOvr>
</p:sldLayout>`,
    'ppt/slideLayouts/_rels/slideLayout1.xml.rels':`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/slideMaster" Target="../slideMasters/slideMaster1.xml"/>
</Relationships>`
  };

  buildZip(files, (mapData.meta?.title||'mindmap').replace(/\s+/g,'_')+'.pptx',
    'application/vnd.openxmlformats-officedocument.presentationml.presentation');
}

// ═══════════════════════════════════════════════════════════════════
//  ZIP BUILDER (no external deps)
// ═══════════════════════════════════════════════════════════════════
function buildZip(fileMap, filename, mimeType){
  const enc = new TextEncoder();
  const u16 = n=>{ const b=new Uint8Array(2); new DataView(b.buffer).setUint16(0,n,true); return b; };
  const u32 = n=>{ const b=new Uint8Array(4); new DataView(b.buffer).setUint32(0,n,true); return b; };
  function crc32(buf){
    if(!crc32._t){ crc32._t=new Uint32Array(256); for(let i=0;i<256;i++){ let c=i; for(let j=0;j<8;j++) c=c&1?0xEDB88320^(c>>>1):c>>>1; crc32._t[i]=c; } }
    let c=0xFFFFFFFF;
    for(let i=0;i<buf.length;i++) c=crc32._t[(c^buf[i])&0xFF]^(c>>>8);
    return (c^0xFFFFFFFF)>>>0;
  }
  function cat(arrays){ const t=arrays.reduce((s,a)=>s+a.length,0); const r=new Uint8Array(t); let o=0; arrays.forEach(a=>{r.set(a,o);o+=a.length;}); return r; }

  const locals=[]; const central=[]; let offset=0;
  for(const [name, content] of Object.entries(fileMap)){
    const nb = enc.encode(name);
    const db = enc.encode(content);
    const crc = crc32(db);
    const lh = cat([
      new Uint8Array([0x50,0x4B,0x03,0x04]),
      u16(20),u16(0),u16(0),u16(0),u16(0),
      u32(crc),u32(db.length),u32(db.length),
      u16(nb.length),u16(0),nb
    ]);
    central.push({nb,crc,size:db.length,offset});
    locals.push(lh,db);
    offset += lh.length + db.length;
  }
  const cdStart = offset;
  const cdParts = central.map(({nb,crc,size,offset:off})=>cat([
    new Uint8Array([0x50,0x4B,0x01,0x02]),
    u16(20),u16(20),u16(0),u16(0),u16(0),u16(0),
    u32(crc),u32(size),u32(size),
    u16(nb.length),u16(0),u16(0),u16(0),u16(0),
    u32(0),u32(off),nb
  ]));
  const cd = cat(cdParts);
  const eocd = cat([
    new Uint8Array([0x50,0x4B,0x05,0x06]),
    u16(0),u16(0),u16(central.length),u16(central.length),
    u32(cd.length),u32(cdStart),u16(0)
  ]);
  dlBlob(new Blob([cat([...locals,cd,eocd])],{type:mimeType}), filename);
}

// ── Download helper ──
function dlBlob(blob, name){
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
}

// ═══════════════════════════════════════════════════════════════════
//  JSON EDITOR
// ═══════════════════════════════════════════════════════════════════
const edPanel  = document.getElementById('editor-panel');
const edTA     = document.getElementById('editor-textarea');
const edStatus = document.getElementById('editor-status');

function toggleEditor(forceOpen){
  const open = forceOpen !== undefined ? forceOpen : !edPanel.classList.contains('open');
  edPanel.classList.toggle('open', open);
  document.getElementById('btn-editor').classList.toggle('active', open);
  document.getElementById('canvas-wrap').style.right = open ? '520px' : '0';
  setTimeout(renderMinimap, 320);
}
document.getElementById('btn-editor').addEventListener('click', ()=>toggleEditor());

function edApply(){
  try{
    const parsed = JSON.parse(edTA.value);
    if(!parsed.root) throw new Error('Missing "root" key');
    mapData = parsed;
    applyMapData();
    edStatus.textContent='✓ Applied';
    edStatus.className='success';
    setTimeout(()=>{edStatus.textContent='Ready';edStatus.className='';},3000);
  }catch(err){
    edStatus.textContent='✗ '+err.message;
    edStatus.className='error';
  }
}
document.getElementById('ed-apply').addEventListener('click', edApply);

edTA.addEventListener('keydown', e=>{
  if(e.key==='Enter'&&(e.ctrlKey||e.metaKey)){e.preventDefault();edApply();}
  if(e.key==='Tab'){e.preventDefault();const s=edTA.selectionStart;edTA.value=edTA.value.slice(0,s)+'  '+edTA.value.slice(edTA.selectionEnd);edTA.selectionStart=edTA.selectionEnd=s+2;}
});

document.getElementById('ed-format').addEventListener('click',()=>{
  try{
    edTA.value=JSON.stringify(JSON.parse(edTA.value),null,2);
    edStatus.textContent='✓ Formatted'; edStatus.className='success';
    setTimeout(()=>{edStatus.textContent='Ready';edStatus.className='';},2000);
  }catch(e){edStatus.textContent='✗ '+e.message;edStatus.className='error';}
});

document.getElementById('ed-download').addEventListener('click',()=>{
  dlBlob(new Blob([edTA.value],{type:'application/json'}),'data.json');
});

document.getElementById('ed-load-file').addEventListener('click',()=>document.getElementById('ed-file-input').click());
document.getElementById('ed-file-input').addEventListener('change',e=>{
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{edTA.value=ev.target.result;edApply();};
  r.readAsText(f);
  e.target.value='';
});

// ── Init ──────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
