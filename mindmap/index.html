<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindMap Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0b0e17;--bg2:#111827;--surface:#1a1f35;--text:#e2e8f0;
  --text-dim:#94a3b8;--accent:#38bdf8;--accent2:#818cf8;
  --border:#2a3050;--shadow:0 8px 32px rgba(0,0,0,.45);
  --toolbar-bg:rgba(17,24,39,.85);
}
[data-theme="light"]{
  --bg:#f0f2f7;--bg2:#ffffff;--surface:#ffffff;--text:#1e293b;
  --text-dim:#64748b;--accent:#0284c7;--accent2:#6366f1;
  --border:#cbd5e1;--shadow:0 8px 32px rgba(0,0,0,.1);
  --toolbar-bg:rgba(255,255,255,.85);
}

html,body{width:100%;height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}

/* ── Toolbar ── */
#toolbar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 24px;
  background:var(--toolbar-bg);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
}
#toolbar h1{font-size:15px;font-weight:700;letter-spacing:-.3px;color:var(--text)}
#toolbar .subtitle{font-size:11px;color:var(--text-dim);margin-left:12px;font-weight:400}
.toolbar-group{display:flex;align-items:center;gap:8px}

.tb-btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:6px 14px;border-radius:8px;border:1px solid var(--border);
  background:var(--surface);color:var(--text);font-size:12px;font-family:inherit;
  cursor:pointer;transition:all .15s;font-weight:500;
}
.tb-btn:hover{border-color:var(--accent);color:var(--accent)}
.tb-btn svg{width:14px;height:14px}
.tb-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ── Theme Toggle ── */
.theme-toggle{
  width:44px;height:24px;border-radius:12px;border:1px solid var(--border);
  background:var(--surface);cursor:pointer;position:relative;transition:all .2s;
}
.theme-toggle::after{
  content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;
  border-radius:50%;background:var(--accent);transition:transform .25s;
}
[data-theme="light"] .theme-toggle::after{transform:translateX(20px)}

/* ── Canvas area ── */
#canvas-wrap{
  position:absolute;inset:0;top:48px;right:0;overflow:hidden;
  background:var(--bg);
  background-image:radial-gradient(circle at 50% 50%,var(--bg2) 0%,var(--bg) 70%);
  transition:right .3s cubic-bezier(.4,0,.2,1);
}

#mindmap-svg{
  position:absolute;top:0;left:0;
  transform-origin:0 0;
  cursor:grab;
}
#mindmap-svg.grabbing{cursor:grabbing}

/* ── Node styles ── */
.mm-node{cursor:pointer;transition:filter .15s}
.mm-node:hover{filter:brightness(1.15) drop-shadow(0 0 12px rgba(56,189,248,.25))}
.mm-node.collapsed-indicator .collapse-badge{display:block}
.collapse-badge{display:none}

.mm-edge{fill:none;transition:opacity .3s;stroke-linejoin:round;stroke-linecap:round}

/* ── Tooltip / info ── */
#info-panel{
  position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
  background:var(--toolbar-bg);backdrop-filter:blur(16px);
  border:1px solid var(--border);border-radius:10px;padding:8px 18px;
  font-size:11px;color:var(--text-dim);pointer-events:none;
  opacity:.7;transition:opacity .3s;
}

/* ── Loading ── */
#loader{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:var(--bg);z-index:999;
}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Minimap ── */
#minimap{
  position:fixed;bottom:48px;right:16px;
  width:180px;height:120px;
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  overflow:hidden;opacity:.7;transition:opacity .2s;
}
#minimap:hover{opacity:1}
#minimap-viewport{position:absolute;border:1.5px solid var(--accent);border-radius:2px;pointer-events:none}

/* ── Editor Panel ── */
#editor-panel{
  position:fixed;top:48px;right:0;bottom:0;width:520px;max-width:90vw;
  background:var(--surface);border-left:1px solid var(--border);
  transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
  z-index:90;display:flex;flex-direction:column;
}
#editor-panel.open{transform:translateX(0)}
#editor-panel.open~#canvas-wrap{right:520px}

.editor-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.editor-header h2{font-size:13px;font-weight:600;color:var(--text)}
.editor-actions{display:flex;gap:6px}
.ed-btn{
  padding:5px 12px;border-radius:6px;border:1px solid var(--border);
  background:var(--bg2);color:var(--text);font-size:11px;font-family:inherit;
  cursor:pointer;font-weight:500;transition:all .15s;
}
.ed-btn:hover{border-color:var(--accent);color:var(--accent)}
.ed-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.ed-btn.primary:hover{opacity:.85}

#editor-textarea{
  flex:1;resize:none;border:none;outline:none;padding:14px 16px;
  font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.55;
  background:var(--bg);color:var(--text);tab-size:2;
}
#editor-status{
  padding:8px 16px;font-size:11px;font-family:'JetBrains Mono',monospace;
  border-top:1px solid var(--border);flex-shrink:0;min-height:32px;
  color:var(--text-dim);
}
#editor-status.error{color:#f87171}
#editor-status.success{color:#34d399}

/* scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<div id="loader"><div class="spinner"></div></div>

<div id="toolbar">
  <div class="toolbar-group">
    <h1 id="map-title">MindMap</h1>

      Editor

    <div class="theme-toggle" id="theme-toggle" title="Toggle theme"></div>

</div>

<!-- Editor Panel -->
<div id="editor-panel">
  <div class="editor-header">
    <h2>JSON Data Editor</h2>
    <div class="editor-actions">
      <button class="ed-btn" id="ed-format" title="Format JSON">Format</button>
      <button class="ed-btn" id="ed-download" title="Download as data.json">Download</button>
      <button class="ed-btn" id="ed-load-file" title="Load from file">Load File</button>
      <button class="ed-btn primary" id="ed-apply" title="Apply changes (Ctrl+Enter)">Apply</button>
    </div>
  </div>
  <textarea id="editor-textarea" spellcheck="false" placeholder="Paste or edit your mindmap JSON here..."></textarea>
  <div id="editor-status">Ready</div>
  <input type="file" id="ed-file-input" accept=".json" style="display:none">
</div>

<div id="canvas-wrap">
  <svg id="mindmap-svg" xmlns="http://www.w3.org/2000/svg"></svg>
</div>

<div id="minimap"><div id="minimap-viewport"></div></div>
<div id="info-panel">Scroll to zoom · Click nodes to collapse · Drag to pan</div>

<script>
// ═══════════════════════════════════════════════════════
//  EMBEDDED FALLBACK DATA — edit or replace with your own
// ═══════════════════════════════════════════════════════
const FALLBACK_DATA = {"meta":{"title":"IAM Strategy Overview","description":"Identity & Access Management Strategic Mindmap","author":"Hany","version":"1.0","layout":"radial","defaultNodeStyle":{"shape":"roundedRect","bgColor":"#1a1a2e","textColor":"#e0e0e0","borderColor":"#3a3a5c","borderWidth":2,"fontSize":13},"defaultEdgeStyle":{"color":"#4a4a6a","width":2,"style":"curved"}},"root":{"id":"root","content":"<b>IAM Strategy</b><br><small>2025–2030</small>","style":{"shape":"circle","bgColor":"#0f3460","textColor":"#ffffff","borderColor":"#e94560","borderWidth":3,"fontSize":16},"collapsed":false,"children":[{"id":"iga","content":"<img src='https://cdn.jsdelivr.net/npm/lucide-static@0.263.1/icons/shield-check.svg' width='18' height='18' style='filter:invert(1);vertical-align:middle;margin-right:6px;'><b>Identity Governance</b><br><small>IGA & Lifecycle</small>","style":{"shape":"roundedRect","bgColor":"#1b4332","textColor":"#d8f3dc","borderColor":"#52b788","borderWidth":2},"children":[{"id":"iga-saviynt","content":"<b>Saviynt</b><br>Cloud IGA Platform","style":{"shape":"roundedRect","bgColor":"#2d6a4f","textColor":"#ffffff","borderColor":"#74c69d"},"children":[{"id":"iga-saviynt-sod","content":"SoD Controls<br><small>Segregation of Duties</small>","style":{"shape":"pill","bgColor":"#40916c","textColor":"#fff","borderColor":"#95d5b2"}},{"id":"iga-saviynt-lc","content":"Lifecycle Mgmt<br><small>Joiner/Mover/Leaver</small>","style":{"shape":"pill","bgColor":"#40916c","textColor":"#fff","borderColor":"#95d5b2"}}]},{"id":"iga-certifications","content":"<b>Access Reviews</b><br>Periodic Certifications","style":{"shape":"roundedRect","bgColor":"#2d6a4f","textColor":"#ffffff","borderColor":"#74c69d"}}]},{"id":"pam","content":"<img src='https://cdn.jsdelivr.net/npm/lucide-static@0.263.1/icons/lock.svg' width='18' height='18' style='filter:invert(1);vertical-align:middle;margin-right:6px;'><b>Privileged Access</b><br><small>PAM & Vaulting</small>","style":{"shape":"roundedRect","bgColor":"#3c1642","textColor":"#f2e9f3","borderColor":"#c77dff","borderWidth":2},"children":[{"id":"pam-cyberark","content":"<b>CyberArk</b><br>Self-Hosted v14","style":{"shape":"roundedRect","bgColor":"#5a189a","textColor":"#ffffff","borderColor":"#9d4edd"},"children":[{"id":"pam-cyberark-vault","content":"Credential Vaulting","style":{"shape":"pill","bgColor":"#7b2cbf","textColor":"#fff","borderColor":"#c77dff"}},{"id":"pam-cyberark-psr","content":"Session Recording<br><small>PSM & HTML5 GW</small>","style":{"shape":"pill","bgColor":"#7b2cbf","textColor":"#fff","borderColor":"#c77dff"}}]},{"id":"pam-jit","content":"<b>JIT Access</b><br>Zero Standing Privilege","style":{"shape":"diamond","bgColor":"#5a189a","textColor":"#ffffff","borderColor":"#e0aaff"}}]},{"id":"ciam","content":"<img src='https://cdn.jsdelivr.net/npm/lucide-static@0.263.1/icons/users.svg' width='18' height='18' style='filter:invert(1);vertical-align:middle;margin-right:6px;'><b>Customer IAM</b><br><small>CIAM & Digital ID</small>","style":{"shape":"roundedRect","bgColor":"#003049","textColor":"#eae2b7","borderColor":"#fcbf49","borderWidth":2},"children":[{"id":"ciam-nafath","content":"<b>Nafath</b><br>National SSO (KSA)","style":{"shape":"roundedRect","bgColor":"#005f73","textColor":"#ffffff","borderColor":"#94d2bd"}},{"id":"ciam-maturity","content":"<b>CIAM Maturity</b><br><small>6 Domains · 31 Capabilities</small>","style":{"shape":"hexagon","bgColor":"#005f73","textColor":"#ffffff","borderColor":"#e9d8a6"}}]},{"id":"compliance","content":"<img src='https://cdn.jsdelivr.net/npm/lucide-static@0.263.1/icons/file-text.svg' width='18' height='18' style='filter:invert(1);vertical-align:middle;margin-right:6px;'><b>Regulatory</b><br><small>Compliance & Privacy</small>","style":{"shape":"roundedRect","bgColor":"#6b2737","textColor":"#fcd5ce","borderColor":"#e76f51","borderWidth":2},"children":[{"id":"comp-pdpl","content":"<b>PDPL</b><br>Saudi Data Protection","style":{"shape":"roundedRect","bgColor":"#9b2226","textColor":"#ffffff","borderColor":"#ee9b00"}},{"id":"comp-sama","content":"<b>SAMA CSF</b><br>Financial Sector","style":{"shape":"roundedRect","bgColor":"#9b2226","textColor":"#ffffff","borderColor":"#ee9b00"}},{"id":"comp-nist","content":"<b>NIST</b> · <b>GDPR</b><br><small>International Frameworks</small>","style":{"shape":"pill","bgColor":"#ae2012","textColor":"#ffffff","borderColor":"#ca6702"}}]},{"id":"cloud","content":"<img src='https://cdn.jsdelivr.net/npm/lucide-static@0.263.1/icons/cloud.svg' width='18' height='18' style='filter:invert(1);vertical-align:middle;margin-right:6px;'><b>Cloud Identity</b><br><small>Entra ID & Azure</small>","style":{"shape":"roundedRect","bgColor":"#0a1628","textColor":"#caf0f8","borderColor":"#00b4d8","borderWidth":2},"children":[{"id":"cloud-entra","content":"<b>Microsoft Entra ID</b><br>Hybrid Identity","style":{"shape":"roundedRect","bgColor":"#023e8a","textColor":"#ffffff","borderColor":"#48cae4"}},{"id":"cloud-cond","content":"<b>Conditional Access</b><br>Zero Trust Policies","style":{"shape":"diamond","bgColor":"#0077b6","textColor":"#ffffff","borderColor":"#90e0ef"}}]}]}};

// ═══════════════════════════════════════════════════════
//  GLOBALS
// ═══════════════════════════════════════════════════════
let mapData=null, nodes=[], edges=[], nodeMap={};
let pan={x:0,y:0}, zoom=1, dragging=false, dragStart={x:0,y:0};
const SVG=document.getElementById('mindmap-svg');
const WRAP=document.getElementById('canvas-wrap');
const NS='http://www.w3.org/2000/svg';

// ── Theme ──
function detectTheme(){
  const saved=localStorage.getItem('mm-theme');
  if(saved) return saved;
  return matchMedia('(prefers-color-scheme:light)').matches?'light':'dark';
}
function applyTheme(t){document.documentElement.setAttribute('data-theme',t);localStorage.setItem('mm-theme',t)}
applyTheme(detectTheme());
document.getElementById('theme-toggle').addEventListener('click',()=>{
  const cur=document.documentElement.getAttribute('data-theme');
  applyTheme(cur==='dark'?'light':'dark');
});

// ── Load data ──
let usingFallback=false;
async function loadData(){
  if(location.protocol!=='file:'){
    try{
      const r=await fetch('data.json');
      if(!r.ok) throw new Error(r.status);
      mapData=await r.json();
    }catch(e){
      console.warn('data.json not found, using embedded fallback');
      mapData=FALLBACK_DATA;
      usingFallback=true;
    }
  }else{
    console.info('Running from file:// — using embedded data');
    mapData=FALLBACK_DATA;
    usingFallback=true;
  }
  applyMapData();
  document.getElementById('loader').style.display='none';
  // populate editor & auto-open if fallback
  document.getElementById('editor-textarea').value=JSON.stringify(mapData,null,2);
  if(usingFallback) toggleEditor(true);
}

function applyMapData(){
  document.getElementById('map-title').textContent=mapData.meta?.title||'MindMap';
  document.getElementById('map-subtitle').textContent=mapData.meta?.description||'';
  document.title=mapData.meta?.title||'MindMap';
  buildGraph();
  layout();
  render();
  fitToScreen();
}

// ── Build flat node/edge lists ──
function buildGraph(){
  nodes=[];edges=[];nodeMap={};
  const dStyle=mapData.meta?.defaultNodeStyle||{};
  const eStyle=mapData.meta?.defaultEdgeStyle||{};
  function walk(n,parent,depth){
    // Style cascade: default → parent's resolved style → this node's explicit style
    const inheritedStyle=parent?{...parent.style}:dStyle;
    const node={
      id:n.id||('n'+nodes.length),
      content:n.content||'',
      style:{...dStyle,...inheritedStyle,...(n.style||{})},
      collapsed:!!n.collapsed,
      children:[],
      parent:parent?parent.id:null,
      depth:depth,
      x:0,y:0,w:0,h:0
    };
    nodes.push(node);
    nodeMap[node.id]=node;
    if(parent){
      parent.children.push(node.id);
      edges.push({from:parent.id,to:node.id,style:eStyle});
    }
    if(n.children){
      n.children.forEach(c=>walk(c,node,depth+1));
    }
  }
  walk(mapData.root,null,0);
}

// ── Measure node size via off-screen div ──
function measureNodes(){
  let measurer=document.getElementById('mm-measurer');
  if(!measurer){
    measurer=document.createElement('div');
    measurer.id='mm-measurer';
    measurer.style.cssText='position:absolute;visibility:hidden;pointer-events:none;top:-9999px;left:-9999px;font-family:"DM Sans",sans-serif;';
    document.body.appendChild(measurer);
  }
  nodes.forEach(n=>{
    const fs=n.style.fontSize||13;
    measurer.style.fontSize=fs+'px';
    measurer.style.maxWidth='220px';
    measurer.style.padding='12px 18px';
    measurer.style.lineHeight='1.45';
    measurer.innerHTML=n.content;
    const r=measurer.getBoundingClientRect();
    n.w=Math.max(r.width+8,60);
    n.h=Math.max(r.height+4,36);
    if(n.style.shape==='circle'||n.style.shape==='star'){
      const d=Math.max(n.w,n.h);
      n.w=d;n.h=d;
    }else if(n.style.shape==='diamond'){
      n.w*=1.45;n.h*=1.45;
    }else if(n.style.shape==='hexagon'||n.style.shape==='parallelogram'||n.style.shape==='trapezoid'){
      n.w*=1.25;
    }else if(n.style.shape==='shield'||n.style.shape==='cloud'){
      n.w*=1.2;n.h*=1.3;
    }
    // Explicit size overrides — take priority over auto-sizing
    if(n.style.width) n.w=n.style.width;
    if(n.style.height) n.h=n.style.height;
  });
}

// ── Visibility check (collapsed ancestors) ──
function isVisible(node){
  if(!node.parent) return true;
  const p=nodeMap[node.parent];
  if(p.collapsed) return false;
  return isVisible(p);
}

// ── Radial tree layout — proper outward branching ──
function layout(){
  measureNodes();
  const root=nodes[0];
  root.x=0;root.y=0;
  root._outAngle=0;
  const GAP=25;

  function getVisibleChildren(id){
    const n=nodeMap[id];
    if(n.collapsed) return [];
    return n.children.filter(()=>true);
  }

  // How much perpendicular space a subtree needs
  function subtreeSpan(id){
    const n=nodeMap[id];
    const ch=getVisibleChildren(id);
    const selfH=n.h+GAP;
    if(ch.length===0) return selfH;
    let total=0;
    ch.forEach(cid=>{total+=subtreeSpan(cid)});
    total+=GAP*(Math.max(0,ch.length-1));
    return Math.max(selfH, total);
  }

  // Place level-1 children radially around root
  const rootChildren=getVisibleChildren(root.id);
  if(rootChildren.length===0) return;

  const spans=rootChildren.map(cid=>subtreeSpan(cid));
  const totalSpan=spans.reduce((s,a)=>s+a,0)+GAP*rootChildren.length;

  let angle=-Math.PI;
  const fullSweep=2*Math.PI;
  rootChildren.forEach((cid,i)=>{
    const cn=nodeMap[cid];
    const frac=spans[i]/(totalSpan||1);
    const sweep=fullSweep*frac;
    const mid=angle+sweep/2;
    const dist=Math.max(root.w,root.h)/2+cn.w/2+GAP+15;
    cn.x=Math.cos(mid)*dist;
    cn.y=Math.sin(mid)*dist;
    cn._outAngle=mid;
    placeSubtree(cid);
    angle+=sweep;
  });

  resolveOverlaps();
}

// Place children of `parentId` in a line perpendicular to parent's outward direction
function placeSubtree(parentId){
  const GAP=25;
  function getVisibleChildren(id){
    const n=nodeMap[id];
    if(n.collapsed) return [];
    return n.children.filter(()=>true);
  }
  function subtreeSpan(id){
    const n=nodeMap[id];
    const ch=getVisibleChildren(id);
    const selfH=n.h+GAP;
    if(ch.length===0) return selfH;
    let total=0;
    ch.forEach(cid=>{total+=subtreeSpan(cid)});
    total+=GAP*(Math.max(0,ch.length-1));
    return Math.max(selfH, total);
  }

  const children=getVisibleChildren(parentId);
  if(children.length===0) return;
  const parent=nodeMap[parentId];
  const outAngle=parent._outAngle||0;

  // Outward direction (unit vector)
  const outX=Math.cos(outAngle), outY=Math.sin(outAngle);
  // Perpendicular direction
  const perpX=-outY, perpY=outX;

  // Distance outward from parent to children
  const maxChildW=Math.max(...children.map(cid=>nodeMap[cid].w));
  const outDist=parent.w/2+maxChildW/2+GAP+10;

  // Junction point: where the stem ends and children branch off
  const jx=parent.x+outX*outDist;
  const jy=parent.y+outY*outDist;

  // Compute spans for perpendicular arrangement
  const spans=children.map(cid=>subtreeSpan(cid));
  const totalSpan=spans.reduce((s,a)=>s+a,0)+GAP*(children.length-1);

  // Place children along the perpendicular line centered on junction
  let offset=-totalSpan/2;
  children.forEach((cid,i)=>{
    const cn=nodeMap[cid];
    const center=offset+spans[i]/2;
    cn.x=jx+perpX*center;
    cn.y=jy+perpY*center;
    cn._outAngle=outAngle; // same outward direction as parent
    offset+=spans[i]+GAP;
    placeSubtree(cid);
  });
}

function resolveOverlaps(){
  const visible=nodes.filter((n,i)=>i===0||isVisible(n));
  const PAD=25;

  for(let iter=0;iter<30;iter++){
    let moved=false;

    for(let i=0;i<visible.length;i++){
      for(let j=i+1;j<visible.length;j++){
        const a=visible[i],b=visible[j];
        const dx=b.x-a.x, dy=b.y-a.y;
        const minDx=(a.w+b.w)/2+PAD;
        const minDy=(a.h+b.h)/2+PAD;
        const ox=minDx-Math.abs(dx), oy=minDy-Math.abs(dy);
        if(ox>0&&oy>0){
          moved=true;
          const dist=Math.sqrt(dx*dx+dy*dy)||1;
          const push=Math.max(ox,oy)*0.52;
          const px=(dx/dist)*push, py=(dy/dist)*push;
          if(a.depth>0){a.x-=px;a.y-=py;}
          if(b.depth>0){b.x+=px;b.y+=py;}
        }
      }
    }
    if(!moved) break;
  }
}

// ── Shape path generators ──
function shapePath(node){
  const x=-node.w/2, y=-node.h/2, w=node.w, h=node.h, r=10;
  const s=node.style.shape||'roundedRect';

  // Custom raw SVG path — use as-is, centered on 0,0
  if(s==='custom' && node.style.customPath) return node.style.customPath;

  if(s==='circle'){
    const rad=Math.max(w,h)/2;
    return `M${rad},0A${rad},${rad},0,1,1,${-rad},0A${rad},${rad},0,1,1,${rad},0Z`;
  }
  if(s==='pill'){
    const rad=h/2;
    return `M${x+rad},${y}L${x+w-rad},${y}A${rad},${rad},0,0,1,${x+w-rad},${y+h}L${x+rad},${y+h}A${rad},${rad},0,0,1,${x+rad},${y}Z`;
  }
  if(s==='diamond'){
    return `M0,${y} L${x+w},0 L0,${y+h} L${x},0Z`;
  }
  if(s==='hexagon'){
    const hw=w/2,hh=h/2,inset=w*0.22;
    return `M${-hw+inset},${-hh}L${hw-inset},${-hh}L${hw},0L${hw-inset},${hh}L${-hw+inset},${hh}L${-hw},0Z`;
  }
  if(s==='octagon'){
    const hw=w/2,hh=h/2,c=Math.min(w,h)*0.28;
    return `M${-hw+c},${-hh}L${hw-c},${-hh}L${hw},${-hh+c}L${hw},${hh-c}L${hw-c},${hh}L${-hw+c},${hh}L${-hw},${hh-c}L${-hw},${-hh+c}Z`;
  }
  if(s==='parallelogram'){
    const sk=w*0.18;
    return `M${x+sk},${y}L${x+w},${y}L${x+w-sk},${y+h}L${x},${y+h}Z`;
  }
  if(s==='trapezoid'){
    const inset=w*0.15;
    return `M${x+inset},${y}L${x+w-inset},${y}L${x+w},${y+h}L${x},${y+h}Z`;
  }
  if(s==='star'){
    const cx=0,cy=0,or=Math.max(w,h)/2,ir=or*0.45,pts=5;
    let d='';
    for(let i=0;i<pts*2;i++){
      const a=Math.PI/2*-1+i*Math.PI/pts;
      const rad=i%2===0?or:ir;
      d+=(i===0?'M':'L')+(cx+Math.cos(a)*rad)+','+(cy+Math.sin(a)*rad);
    }
    return d+'Z';
  }
  if(s==='shield'){
    const hw=w/2,hh=h/2;
    return `M0,${-hh}Q${hw},${-hh},${hw},${-hh*0.3}L${hw},${hh*0.15}Q${hw},${hh*0.7},0,${hh}Q${-hw},${hh*0.7},${-hw},${hh*0.15}L${-hw},${-hh*0.3}Q${-hw},${-hh},0,${-hh}Z`;
  }
  if(s==='cloud'){
    const hw=w/2,hh=h/2;
    return `M${-hw*0.5},${hh*0.4}`
      +`Q${-hw},${hh*0.4},${-hw},0`
      +`Q${-hw},${-hh*0.6},${-hw*0.55},${-hh*0.7}`
      +`Q${-hw*0.35},${-hh},0,${-hh}`
      +`Q${hw*0.4},${-hh},${hw*0.55},${-hh*0.65}`
      +`Q${hw},${-hh*0.5},${hw},0`
      +`Q${hw},${hh*0.4},${hw*0.5},${hh*0.4}Z`;
  }
  // roundedRect default
  return `M${x+r},${y}L${x+w-r},${y}Q${x+w},${y},${x+w},${y+r}L${x+w},${y+h-r}Q${x+w},${y+h},${x+w-r},${y+h}L${x+r},${y+h}Q${x},${y+h},${x},${y+h-r}L${x},${y+r}Q${x},${y},${x+r},${y}Z`;
}

// ── Smooth cubic bezier edge routing ──
let _blockerList=[];
let _renderedEdges=[]; // stored as arrays of sampled {x,y} points
const EDGE_SAMPLES=24;

function buildBlockerList(){
  _blockerList=[];
  for(let i=0;i<nodes.length;i++){
    const n=nodes[i];
    if(n.depth>0&&!isVisible(n)) continue;
    _blockerList.push(n);
  }
  _renderedEdges=[];
}

// Sample cubic bezier at t
function cubicPt(p0x,p0y,c1x,c1y,c2x,c2y,p3x,p3y,t){
  const m=1-t;
  return {
    x:m*m*m*p0x+3*m*m*t*c1x+3*m*t*t*c2x+t*t*t*p3x,
    y:m*m*m*p0y+3*m*m*t*c1y+3*m*t*t*c2y+t*t*t*p3y
  };
}

// Sample a full cubic bezier into an array of points
function sampleCubic(p0x,p0y,c1x,c1y,c2x,c2y,p3x,p3y){
  const pts=[];
  for(let i=0;i<=EDGE_SAMPLES;i++){
    pts.push(cubicPt(p0x,p0y,c1x,c1y,c2x,c2y,p3x,p3y,i/EDGE_SAMPLES));
  }
  return pts;
}

// Test if two line segments (a1-a2) and (b1-b2) intersect
function segsIntersect(a1x,a1y,a2x,a2y,b1x,b1y,b2x,b2y){
  const d1x=a2x-a1x, d1y=a2y-a1y;
  const d2x=b2x-b1x, d2y=b2y-b1y;
  const cross=d1x*d2y-d1y*d2x;
  if(Math.abs(cross)<1e-8) return false;
  const dx=b1x-a1x, dy=b1y-a1y;
  const t=(dx*d2y-dy*d2x)/cross;
  const u=(dx*d1y-dy*d1x)/cross;
  return t>0.02&&t<0.98&&u>0.02&&u<0.98;
}

// Test cubic bezier against all blocker nodes
function cubicBlockedByNodes(p0x,p0y,c1x,c1y,c2x,c2y,p3x,p3y,skip1,skip2,pad){
  for(const nd of _blockerList){
    if(nd.id===skip1||nd.id===skip2) continue;
    const l=nd.x-nd.w/2-pad, r=nd.x+nd.w/2+pad;
    const top=nd.y-nd.h/2-pad, bot=nd.y+nd.h/2+pad;
    for(let s=1;s<EDGE_SAMPLES;s++){
      const pt=cubicPt(p0x,p0y,c1x,c1y,c2x,c2y,p3x,p3y,s/EDGE_SAMPLES);
      if(pt.x>l&&pt.x<r&&pt.y>top&&pt.y<bot) return true;
    }
  }
  return false;
}

// Test sampled curve against all previously rendered edges
function cubicCrossesEdges(pts){
  for(const prev of _renderedEdges){
    for(let i=0;i<pts.length-1;i++){
      for(let j=0;j<prev.length-1;j++){
        if(segsIntersect(
          pts[i].x,pts[i].y,pts[i+1].x,pts[i+1].y,
          prev[j].x,prev[j].y,prev[j+1].x,prev[j+1].y
        )) return true;
      }
    }
  }
  return false;
}

// Combined check: nodes + edges
function curveIsBlocked(p0x,p0y,c1x,c1y,c2x,c2y,p3x,p3y,skip1,skip2,pad){
  if(cubicBlockedByNodes(p0x,p0y,c1x,c1y,c2x,c2y,p3x,p3y,skip1,skip2,pad)) return true;
  const pts=sampleCubic(p0x,p0y,c1x,c1y,c2x,c2y,p3x,p3y);
  if(cubicCrossesEdges(pts)) return true;
  return false;
}

function edgePath(n1,n2){
  const PAD=8;
  const dx=n2.x-n1.x, dy=n2.y-n1.y;
  const dist=Math.sqrt(dx*dx+dy*dy)||1;
  const ux=dx/dist, uy=dy/dist;

  let dirX,dirY;
  if(n1.depth===0){
    dirX=ux; dirY=uy;
  }else{
    const outAngle=n1._outAngle||Math.atan2(n1.y,n1.x)||0;
    dirX=Math.cos(outAngle); dirY=Math.sin(outAngle);
  }

  const cpDist=dist*0.45;
  const perpX=-uy, perpY=ux;

  // Build candidate curves: base + shifted variants
  const candidates=[];

  // Base curve
  candidates.push({
    c1x:n1.x+dirX*cpDist, c1y:n1.y+dirY*cpDist,
    c2x:n2.x-dirX*cpDist, c2y:n2.y-dirY*cpDist
  });

  // Shifted variants — increasing offset, both sides
  for(let a=1;a<=8;a++){
    const offset=20*a;
    for(const sign of [1,-1]){
      const sx=perpX*offset*sign+dirX*offset*0.3;
      const sy=perpY*offset*sign+dirY*offset*0.3;
      candidates.push({
        c1x:n1.x+dirX*cpDist+sx, c1y:n1.y+dirY*cpDist+sy,
        c2x:n2.x-dirX*cpDist+sx, c2y:n2.y-dirY*cpDist+sy
      });
    }
  }

  // Try each candidate, pick first that's clear of nodes AND edges
  for(const c of candidates){
    if(!curveIsBlocked(n1.x,n1.y,c.c1x,c.c1y,c.c2x,c.c2y,n2.x,n2.y,n1.id,n2.id,PAD)){
      const pts=sampleCubic(n1.x,n1.y,c.c1x,c.c1y,c.c2x,c.c2y,n2.x,n2.y);
      _renderedEdges.push(pts);
      return `M${n1.x},${n1.y}C${c.c1x},${c.c1y},${c.c2x},${c.c2y},${n2.x},${n2.y}`;
    }
  }

  // Fallback: wide outward curve, register it regardless
  const c1x=n1.x+dirX*dist*0.7;
  const c1y=n1.y+dirY*dist*0.7;
  const c2x=n2.x+dirX*dist*0.1;
  const c2y=n2.y+dirY*dist*0.1;
  const pts=sampleCubic(n1.x,n1.y,c1x,c1y,c2x,c2y,n2.x,n2.y);
  _renderedEdges.push(pts);
  return `M${n1.x},${n1.y}C${c1x},${c1y},${c2x},${c2y},${n2.x},${n2.y}`;
}

// ── Render SVG ──
let vbX=0,vbY=0; // track current viewBox origin
function render(){
  SVG.innerHTML='';
  // Compute bounds
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  nodes.forEach(n=>{
    if(!isVisible(n)&&n.depth>0) return;
    minX=Math.min(minX,n.x-n.w/2);
    minY=Math.min(minY,n.y-n.h/2);
    maxX=Math.max(maxX,n.x+n.w/2);
    maxY=Math.max(maxY,n.y+n.h/2);
  });
  const pad=80;
  minX-=pad;minY-=pad;maxX+=pad;maxY+=pad;
  vbX=minX;vbY=minY;
  const svgW=maxX-minX, svgH=maxY-minY;
  SVG.setAttribute('width',svgW);
  SVG.setAttribute('height',svgH);
  SVG.setAttribute('viewBox',`${minX} ${minY} ${svgW} ${svgH}`);

  // Defs
  const defs=document.createElementNS(NS,'defs');
  // glow filter
  defs.innerHTML=`<filter id="glow"><feGaussianBlur stdDeviation="3" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>`;
  SVG.appendChild(defs);

  // Edges
  buildBlockerList();
  const edgeG=document.createElementNS(NS,'g');
  edgeG.setAttribute('class','edges');
  edges.forEach(e=>{
    const n1=nodeMap[e.from], n2=nodeMap[e.to];
    if(!isVisible(n2)) return;
    const path=document.createElementNS(NS,'path');
    path.setAttribute('d',edgePath(n1,n2));
    path.setAttribute('class','mm-edge');
    path.setAttribute('fill','none');
    path.setAttribute('stroke',e.style.color||'#4a4a6a');
    path.setAttribute('stroke-width',e.style.width||2);
    path.setAttribute('stroke-linejoin','round');
    path.setAttribute('stroke-linecap','round');
    path.setAttribute('opacity','0.65');
    edgeG.appendChild(path);
  });
  SVG.appendChild(edgeG);

  // Nodes
  const nodeG=document.createElementNS(NS,'g');
  nodeG.setAttribute('class','nodes');
  nodes.forEach(n=>{
    if(!isVisible(n)&&n.depth>0) return;
    const g=document.createElementNS(NS,'g');
    g.setAttribute('class','mm-node'+(n.collapsed&&n.children.length?' collapsed-indicator':''));
    g.setAttribute('transform',`translate(${n.x},${n.y})`);
    g.setAttribute('data-id',n.id);

    // Shape — either svgShape URL or path
    if(n.style.svgShape){
      const img=document.createElementNS(NS,'image');
      img.setAttribute('href',n.style.svgShape);
      img.setAttribute('x',-n.w/2);
      img.setAttribute('y',-n.h/2);
      img.setAttribute('width',n.w);
      img.setAttribute('height',n.h);
      img.setAttribute('preserveAspectRatio','xMidYMid meet');
      g.appendChild(img);
      // optional border overlay
      if(n.style.borderColor){
        const border=document.createElementNS(NS,'rect');
        border.setAttribute('x',-n.w/2);border.setAttribute('y',-n.h/2);
        border.setAttribute('width',n.w);border.setAttribute('height',n.h);
        border.setAttribute('rx',8);border.setAttribute('fill','none');
        border.setAttribute('stroke',n.style.borderColor);
        border.setAttribute('stroke-width',n.style.borderWidth||2);
        g.appendChild(border);
      }
    }else{
      const shape=document.createElementNS(NS,'path');
      shape.setAttribute('d',shapePath(n));
      shape.setAttribute('fill',n.style.bgColor||'#1a1a2e');
      shape.setAttribute('stroke',n.style.borderColor||'#3a3a5c');
      shape.setAttribute('stroke-width',n.style.borderWidth||2);
      g.appendChild(shape);
    }

    // HTML content via foreignObject
    const fo=document.createElementNS(NS,'foreignObject');
    const sh=n.style.shape||'roundedRect';
    const tight=['diamond','star','shield','cloud'].includes(sh);
    const foW=tight?n.w*0.6:n.w-8;
    const foH=tight?n.h*0.55:n.h-4;
    fo.setAttribute('x',-foW/2);
    fo.setAttribute('y',-foH/2);
    fo.setAttribute('width',foW);
    fo.setAttribute('height',foH);
    const div=document.createElement('div');
    div.setAttribute('xmlns','http://www.w3.org/1999/xhtml');
    div.style.cssText=`width:100%;height:100%;display:flex;align-items:center;justify-content:center;text-align:center;font-family:'DM Sans',sans-serif;font-size:${n.style.fontSize||13}px;color:${n.style.textColor||'#e0e0e0'};line-height:1.45;overflow:hidden;word-break:break-word;`;
    div.innerHTML=`<div style="display:block">${n.content}</div>`;
    fo.appendChild(div);
    g.appendChild(fo);

    // Collapse badge
    if(n.children.length>0){
      const badge=document.createElementNS(NS,'g');
      badge.setAttribute('class','collapse-badge');
      const bc=document.createElementNS(NS,'circle');
      bc.setAttribute('cx',n.w/2-4);
      bc.setAttribute('cy',-n.h/2+4);
      bc.setAttribute('r',9);
      bc.setAttribute('fill',n.style.borderColor||'#3a3a5c');
      badge.appendChild(bc);
      const bt=document.createElementNS(NS,'text');
      bt.setAttribute('x',n.w/2-4);
      bt.setAttribute('y',-n.h/2+8);
      bt.setAttribute('text-anchor','middle');
      bt.setAttribute('fill','#fff');
      bt.setAttribute('font-size','11');
      bt.setAttribute('font-family','DM Sans');
      bt.textContent='+'+countHidden(n.id);
      badge.appendChild(bt);
      g.appendChild(badge);
    }

    // Click handler — preserves view position, expands one level only
    g.addEventListener('click',(ev)=>{
      ev.stopPropagation();
      if(n.children.length>0){
        if(n.collapsed){
          // Expanding: show direct children but keep their children collapsed
          n.collapsed=false;
          n.children.forEach(cid=>{
            const child=nodeMap[cid];
            if(child.children.length>0) child.collapsed=true;
          });
        }else{
          n.collapsed=true;
        }
        relayoutPreserving(n);
      }
    });

    nodeG.appendChild(g);
  });
  SVG.appendChild(nodeG);
  renderMinimap();
}

function countHidden(id){
  const n=nodeMap[id];
  let c=0;
  function walk(nid){
    const nd=nodeMap[nid];
    nd.children.forEach(cid=>{c++;walk(cid)});
  }
  walk(id);
  return c;
}

// ── Pan/Zoom ──
function updateTransform(){
  SVG.style.transform=`translate(${pan.x}px,${pan.y}px) scale(${zoom})`;
}

WRAP.addEventListener('pointerdown',e=>{
  if(e.target.closest('.mm-node')) return;
  dragging=true;dragStart={x:e.clientX-pan.x,y:e.clientY-pan.y};
  SVG.classList.add('grabbing');
});
window.addEventListener('pointermove',e=>{
  if(!dragging) return;
  pan.x=e.clientX-dragStart.x;
  pan.y=e.clientY-dragStart.y;
  updateTransform();renderMinimap();
});
window.addEventListener('pointerup',()=>{dragging=false;SVG.classList.remove('grabbing')});

WRAP.addEventListener('wheel',e=>{
  e.preventDefault();
  const rect=WRAP.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const oldZ=zoom;
  const delta=e.deltaY>0?0.9:1.1;
  zoom=Math.min(Math.max(zoom*delta,0.1),5);
  // zoom toward cursor
  pan.x=mx-(mx-pan.x)*(zoom/oldZ);
  pan.y=my-(my-pan.y)*(zoom/oldZ);
  updateTransform();renderMinimap();
},{passive:false});

// Touch pinch zoom
let lastPinchDist=null;
WRAP.addEventListener('touchstart',e=>{if(e.touches.length===2){lastPinchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY)}},{passive:true});
WRAP.addEventListener('touchmove',e=>{
  if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    if(lastPinchDist){const s=d/lastPinchDist;zoom=Math.min(Math.max(zoom*s,0.1),5);updateTransform();renderMinimap()}
    lastPinchDist=d;
  }
},{passive:true});
WRAP.addEventListener('touchend',()=>{lastPinchDist=null});

function fitToScreen(){
  const ww=WRAP.clientWidth, wh=WRAP.clientHeight;
  const sw=parseFloat(SVG.getAttribute('width')),sh=parseFloat(SVG.getAttribute('height'));
  zoom=Math.min(ww/sw,wh/sh,1.5)*0.9;
  pan.x=(ww-sw*zoom)/2;
  pan.y=(wh-sh*zoom)/2;
  updateTransform();renderMinimap();
}

// ── Minimap ──
function renderMinimap(){
  const mm=document.getElementById('minimap');
  const vp=document.getElementById('minimap-viewport');
  const sw=parseFloat(SVG.getAttribute('width'))||1;
  const sh=parseFloat(SVG.getAttribute('height'))||1;
  const mmW=mm.clientWidth, mmH=mm.clientHeight;
  const scale=Math.min(mmW/sw,mmH/sh)*0.9;

  // viewport rect
  const ww=WRAP.clientWidth, wh=WRAP.clientHeight;
  const vpW=(ww/zoom)*scale, vpH=(wh/zoom)*scale;
  const vpX=(-pan.x/zoom)*scale + (mmW-sw*scale)/2;
  const vpY=(-pan.y/zoom)*scale + (mmH-sh*scale)/2;
  vp.style.width=vpW+'px';vp.style.height=vpH+'px';
  vp.style.left=vpX+'px';vp.style.top=vpY+'px';
}

// ── Toolbar actions ──
function relayoutPreserving(anchor){
  layout();render();
  if(anchor){
    // Center the viewport on the clicked node
    const ww=WRAP.clientWidth, wh=WRAP.clientHeight;
    pan.x=ww/2-(anchor.x-vbX)*zoom;
    pan.y=wh/2-(anchor.y-vbY)*zoom;
  }
  updateTransform();renderMinimap();
}
document.getElementById('btn-expand').addEventListener('click',()=>{
  nodes.forEach(n=>n.collapsed=false);relayoutPreserving(nodes[0]);
});
document.getElementById('btn-collapse').addEventListener('click',()=>{
  nodes.forEach(n=>{if(n.depth>0&&n.children.length)n.collapsed=true});relayoutPreserving(nodes[0]);
});
document.getElementById('btn-fit').addEventListener('click',()=>fitToScreen());
// ── Helper: extract inline style property from style string ──
function extractStyle(styleStr, prop){
  if(!styleStr) return null;
  const re=new RegExp(prop+'\\s*:\\s*([^;]+)','i');
  const m=styleStr.match(re);
  return m?m[1].trim():null;
}

// ── Convert foreignObject HTML to native SVG text elements ──
function convertForeignObjectsToText(svgClone){
  const fos=svgClone.querySelectorAll('foreignObject');
  fos.forEach(fo=>{
    const g=fo.parentNode;
    const nodeId=g.getAttribute('data-id');
    const nd=nodeId?nodeMap[nodeId]:null;
    const baseFontSize=nd?(nd.style.fontSize||13):13;
    const baseTextColor=nd?(nd.style.textColor||'#e0e0e0'):'#e0e0e0';

    const html=fo.innerHTML;
    const lineChunks=html.replace(/<div[^>]*>/gi,'').replace(/<\/div>/gi,'')
      .split(/<br\s*\/?>/gi);

    const textEl=document.createElementNS(NS,'text');
    textEl.setAttribute('text-anchor','middle');
    textEl.setAttribute('dominant-baseline','central');
    textEl.setAttribute('fill',baseTextColor);
    textEl.setAttribute('font-family','DM Sans, sans-serif');
    textEl.setAttribute('font-size',baseFontSize);

    const totalLines=lineChunks.length;
    const lineHeight=baseFontSize*1.45;
    const startY=-(totalLines-1)*lineHeight/2;

    lineChunks.forEach((line,li)=>{
      const cleaned=line.replace(/<img[^>]*>/gi,'').trim();
      if(!cleaned) return;

      // Parse segments: <b>, <strong>, <small>, <span> with style, plain text
      const parts=[];
      const segRe=/<(b|strong)([^>]*)>(.*?)<\/\1>|<small([^>]*)>(.*?)<\/small>|<span([^>]*)>(.*?)<\/span>|([^<]+)/gi;
      let sm;
      while((sm=segRe.exec(cleaned))!==null){
        if(sm[1]){// <b> or <strong>
          const innerStyle=sm[2]||'';
          const fs=extractStyle(innerStyle,'font-size');
          const col=extractStyle(innerStyle,'color');
          parts.push({text:sm[3].replace(/<[^>]+>/g,''),bold:true,
            fontSize:fs?parseInt(fs):null, color:col||null});
        }else if(sm[5]!==undefined){// <small>
          const innerStyle=sm[4]||'';
          const fs=extractStyle(innerStyle,'font-size');
          const col=extractStyle(innerStyle,'color');
          parts.push({text:sm[5].replace(/<[^>]+>/g,''),bold:false,
            fontSize:fs?parseInt(fs):Math.round(baseFontSize*0.72),
            color:col||null});
        }else if(sm[7]!==undefined){// <span>
          const innerStyle=sm[6]||'';
          const fs=extractStyle(innerStyle,'font-size');
          const col=extractStyle(innerStyle,'color');
          const fw=extractStyle(innerStyle,'font-weight');
          parts.push({text:sm[7].replace(/<[^>]+>/g,''),
            bold:fw==='bold'||fw==='700',
            fontSize:fs?parseInt(fs):null, color:col||null});
        }else if(sm[8]){// plain text
          parts.push({text:sm[8],bold:false,fontSize:null,color:null});
        }
      }

      if(parts.length===0){
        const tspan=document.createElementNS(NS,'tspan');
        tspan.setAttribute('x','0');
        tspan.setAttribute('dy',li===0?startY:lineHeight);
        tspan.textContent=cleaned.replace(/<[^>]+>/g,'');
        textEl.appendChild(tspan);
      }else{
        let firstInLine=true;
        parts.forEach(p=>{
          if(!p.text.trim()) return;
          const sub=document.createElementNS(NS,'tspan');
          sub.textContent=p.text;
          if(p.bold) sub.setAttribute('font-weight','700');
          if(p.fontSize) sub.setAttribute('font-size',p.fontSize);
          if(p.color) sub.setAttribute('fill',p.color);
          if(firstInLine){
            sub.setAttribute('x','0');
            sub.setAttribute('dy',li===0?startY:lineHeight);
            firstInLine=false;
          }
          textEl.appendChild(sub);
        });
      }
    });

    fo.parentNode.replaceChild(textEl,fo);
  });
}

// ── SVG Export ──
document.getElementById('btn-export').addEventListener('click',()=>{
  const clone=SVG.cloneNode(true);
  clone.removeAttribute('style');
  clone.setAttribute('xmlns','http://www.w3.org/2000/svg');
  clone.setAttribute('xmlns:xlink','http://www.w3.org/1999/xlink');
  convertForeignObjectsToText(clone);
  const blob=new Blob([new XMLSerializer().serializeToString(clone)],{type:'image/svg+xml'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=(mapData.meta?.title||'mindmap').replace(/\s+/g,'_')+'.svg';
  a.click();
  URL.revokeObjectURL(a.href);
});

// ── PNG Export ──
document.getElementById('btn-export-png').addEventListener('click',()=>{
  // Use the live SVG with foreignObject (renders correctly via browser)
  const clone=SVG.cloneNode(true);
  clone.removeAttribute('style');
  clone.setAttribute('xmlns','http://www.w3.org/2000/svg');
  clone.setAttribute('xmlns:xhtml','http://www.w3.org/1999/xhtml');

  // Inline the font for foreignObject rendering
  const styleEl=document.createElementNS(NS,'style');
  styleEl.textContent=`@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap');`;
  clone.insertBefore(styleEl,clone.firstChild);

  // Ensure all foreignObject divs have xmlns
  clone.querySelectorAll('foreignObject div').forEach(d=>{
    d.setAttribute('xmlns','http://www.w3.org/1999/xhtml');
  });

  const svgStr=new XMLSerializer().serializeToString(clone);
  const svgW=parseFloat(clone.getAttribute('width'));
  const svgH=parseFloat(clone.getAttribute('height'));
  const scale=2; // 2x for retina

  const canvas=document.createElement('canvas');
  canvas.width=svgW*scale;
  canvas.height=svgH*scale;
  const ctx=canvas.getContext('2d');

  // Draw background
  const theme=document.documentElement.getAttribute('data-theme');
  ctx.fillStyle=theme==='light'?'#f0f2f7':'#0b0e17';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  const img=new Image();
  img.onload=()=>{
    ctx.drawImage(img,0,0,canvas.width,canvas.height);
    canvas.toBlob(blob=>{
      const a=document.createElement('a');
      a.href=URL.createObjectURL(blob);
      a.download=(mapData.meta?.title||'mindmap').replace(/\s+/g,'_')+'.png';
      a.click();
      URL.revokeObjectURL(a.href);
    },'image/png');
  };
  img.onerror=()=>{
    // Fallback: convert foreignObject to text for PNG too
    const clone2=SVG.cloneNode(true);
    clone2.removeAttribute('style');
    clone2.setAttribute('xmlns','http://www.w3.org/2000/svg');
    convertForeignObjectsToText(clone2);
    const svgStr2=new XMLSerializer().serializeToString(clone2);
    const img2=new Image();
    img2.onload=()=>{
      ctx.drawImage(img2,0,0,canvas.width,canvas.height);
      canvas.toBlob(blob=>{
        const a=document.createElement('a');
        a.href=URL.createObjectURL(blob);
        a.download=(mapData.meta?.title||'mindmap').replace(/\s+/g,'_')+'.png';
        a.click();
        URL.revokeObjectURL(a.href);
      },'image/png');
    };
    img2.src='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svgStr2);
  };
  img.src='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svgStr);
});

// Keyboard
document.addEventListener('keydown',e=>{
  if(e.key==='='||e.key==='+'){zoom=Math.min(zoom*1.15,5);updateTransform();renderMinimap()}
  if(e.key==='-'){zoom=Math.max(zoom/1.15,0.1);updateTransform();renderMinimap()}
  if(e.key==='0'){fitToScreen()}
});

// ── Editor ──
const edPanel=document.getElementById('editor-panel');
const edTA=document.getElementById('editor-textarea');
const edStatus=document.getElementById('editor-status');

function toggleEditor(forceOpen){
  const open=forceOpen!==undefined?forceOpen:!edPanel.classList.contains('open');
  edPanel.classList.toggle('open',open);
  document.getElementById('btn-editor').classList.toggle('active',open);
  // adjust canvas
  document.getElementById('canvas-wrap').style.right=open?'520px':'0';
  setTimeout(()=>renderMinimap(),320);
}

document.getElementById('btn-editor').addEventListener('click',()=>toggleEditor());

// Apply
function editorApply(){
  const raw=edTA.value.trim();
  try{
    const parsed=JSON.parse(raw);
    if(!parsed.root){throw new Error('Missing "root" key in JSON')}
    mapData=parsed;
    applyMapData();
    edStatus.textContent='✓ Applied successfully';
    edStatus.className='success';
    setTimeout(()=>{edStatus.textContent='Ready';edStatus.className='';},3000);
  }catch(err){
    edStatus.textContent='✗ '+err.message;
    edStatus.className='error';
  }
}
document.getElementById('ed-apply').addEventListener('click',editorApply);

// Ctrl+Enter to apply
edTA.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&(e.ctrlKey||e.metaKey)){e.preventDefault();editorApply()}
  // Tab inserts 2 spaces
  if(e.key==='Tab'){
    e.preventDefault();
    const s=edTA.selectionStart,end=edTA.selectionEnd;
    edTA.value=edTA.value.substring(0,s)+'  '+edTA.value.substring(end);
    edTA.selectionStart=edTA.selectionEnd=s+2;
  }
});

// Format
document.getElementById('ed-format').addEventListener('click',()=>{
  try{
    const parsed=JSON.parse(edTA.value);
    edTA.value=JSON.stringify(parsed,null,2);
    edStatus.textContent='✓ Formatted';edStatus.className='success';
    setTimeout(()=>{edStatus.textContent='Ready';edStatus.className='';},2000);
  }catch(err){
    edStatus.textContent='✗ Cannot format: '+err.message;edStatus.className='error';
  }
});

// Download
document.getElementById('ed-download').addEventListener('click',()=>{
  const blob=new Blob([edTA.value],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='data.json';a.click();
  URL.revokeObjectURL(a.href);
});

// Load file
document.getElementById('ed-load-file').addEventListener('click',()=>{
  document.getElementById('ed-file-input').click();
});
document.getElementById('ed-file-input').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    edTA.value=ev.target.result;
    editorApply();
  };
  reader.readAsText(f);
  e.target.value='';
});

// ── Init ──
window.addEventListener('resize',()=>{renderMinimap()});
loadData();
</script>
