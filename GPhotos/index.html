<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Photos Viewer</title>
    <link rel="stylesheet" href='style.css'>
    <link rel="shortcut icon" href='/Images/bigtalk.ico' />
</head>
<body>
    <div class="container">
        <h1>Google Photos Viewer (v.1.4)</h1>
        <button id="signin-button" onclick="handleAuthClick()" style="display:none;">Sign In</button>
        <div id="error-message"></div>
        <table id="photos-table">
            <thead>
                <tr>
                    <th>Photo</th>
                    <th>Album</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <button id="prev-page" onclick="previousPage()" disabled>Previous</button>
        <button id="next-page" onclick="nextPage()" disabled>Next</button>
    </div>
    <script defer src="https://apis.google.com/js/api.js" onload="init()"></script>
    <script src="./script.js"></script>
</body>
</html>
