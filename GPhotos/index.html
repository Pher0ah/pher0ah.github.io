<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Photos Viewer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 15px;
      text-align: left;
      border-bottom: 1px solid #ddd;
    }

    th {
      background-color: #f2f2f2;
      font-weight: bold;
    }

    img {
      max-width: 100px;
      height: auto;
    }

    button {
      background-color: #4CAF50;
      border: none;
      color: white;
      padding: 10px 20px;
      text-align: center;
      text-decoration: none;
      display: inline-block;
      font-size: 16px;
      margin: 5px 2px;
      cursor: pointer;
    }

    button:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }

    #error-message {
      color: red;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Google Photos Viewer (v.1.0)</h1>
    <button id="signin-button" onclick="handleAuthClick()" style="display:none;">Sign In</button>
    <div id="error-message"></div>
    <table id="photos-table">
      <thead>
        <tr>
          <th>Photo</th>
          <th>Album</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <button id="prev-page" onclick="previousPage()" disabled>Previous</button>
    <button id="next-page" onclick="nextPage()" disabled>Next</button>
  </div>
  <script ></script>
  <script async defer src="https://apis.google.com/js/api.js">
    const API_KEY = 'AIzaSyBqYyTlQoxWZpEYogPt9cHAJoIvlZySoko';
    const CLIENT_ID = '872435311738-6o0o4bmu4arcoo9m58oh0n7e0ovrr94s.apps.googleusercontent.com';
    const SCOPES = 'https://www.googleapis.com/auth/photoslibrary.readonly';

    function init() {
      gapi.load('client:auth2', initClient);
    }

    function initClient() {
      gapi.client.init({
        apiKey: API_KEY,
        clientId: CLIENT_ID,
        scope: SCOPES
      }).then(() => {
        gapi.auth2.getAuthInstance().isSignedIn.listen(updateSigninStatus);
        updateSigninStatus(gapi.auth2.getAuthInstance().isSignedIn.get());
      });
    }

    function updateSigninStatus(isSignedIn) {
      if (isSignedIn) {
        loadPhotos();
      } else {
        gapi.auth2.getAuthInstance().signIn();
      }
    }

    gapi.load('client:auth2', initClient);

    const PAGE_SIZE = 10;
    let currentPage = 0;
    let currentPhotos = [];

    async function loadPhotos() {
      try {
        const albums = await getAlbums();
        const photos = await getAllPhotos();

        currentPhotos = photos.map(photo => {
          const album = albums.find(album => album.id === photo.albumId);
          return {
            url: photo.baseUrl,
            album: album ? album.title : 'No Album'
          };
        });

        displayPage(currentPage);
      } catch (error) {
        displayError(error.message);
      }
    }
  
    async function getAlbums() {
      const response = await gapi.client.photoslibrary.albums.list();
      return response.result.albums || [];
    }
  
    async function getAllPhotos() {
      let photos = [];
      let nextPageToken;
  
      do {
        const response = await gapi.client.photoslibrary.mediaItems.list({
          pageSize: 100,
          pageToken: nextPageToken
        });
  
        photos = photos.concat(response.result.mediaItems || []);
        nextPageToken = response.result.nextPageToken;
      } while (nextPageToken);
  
      return photos;
    }
  
    function displayPage(page) {
      const start = page * PAGE_SIZE;
      const end = start + PAGE_SIZE;
      const pageData = currentPhotos.slice(start, end);
      updateTable(pageData);
  
      const prevButton = document.getElementById('prev-page');
      const nextButton = document.getElementById('next-page');
      prevButton.disabled = page === 0;
      nextButton.disabled = end >= currentPhotos.length;
    }
  
    function previousPage() {
      if (currentPage > 0) {
        currentPage--;
        displayPage(currentPage);
      }
    }
  
    function nextPage() {
      const totalPages = Math.ceil(currentPhotos.length / PAGE_SIZE);
      if (currentPage < totalPages - 1) {
        currentPage++;
        displayPage(currentPage);
      }
    }
  
    function updateTable(data) {
      const tbody = document.querySelector('#photos-table tbody');
      tbody.innerHTML = '';
  
      data.forEach(rowData => {
        const row = document.createElement('tr');
  
        const imgCell = document.createElement('td');
        const img = document.createElement('img');
        img.src = rowData.url;
        img.width = 100;
        imgCell.appendChild(img);
        row.appendChild(imgCell);
  
        const albumCell = document.createElement('td');
        albumCell.innerText = rowData.album;
        row.appendChild(albumCell);
  
        tbody.appendChild(row);
      });
    }
  
    function displayError(message) {
      const errorMessageElement = document.getElementById('error-message');
      errorMessageElement.textContent = message;
    }
  </script>
</body>
</html>
