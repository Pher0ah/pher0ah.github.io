<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Photos Viewer (v.1.7)</title>
  <link rel="stylesheet" href='style.css'>
  <link rel="shortcut icon" href='/Images/bigtalk.ico' />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js"></script>
</head>
<body>
  <div class="container">
    <h1>Google Photos Viewer</h1>
    <div id="g_id_onload"
         data-client_id="872435311738-6o0o4bmu4arcoo9m58oh0n7e0ovrr94s.apps.googleusercontent.com"
         data-context="use"
         data-ux_mode="popup"
         data-auto_prompt="false">
    </div>
    <div class="g_id_signin"
         data-client_id="872435311738-6o0o4bmu4arcoo9m58oh0n7e0ovrr94s.apps.googleusercontent.com"
         data-callback="handleCredentialResponse()"
         data-auto_prompt="false">
    </div>

    <button id="signin-button" onclick="handleAuthClick()" style="display:none;">Sign In</button>
    <div id="error-message"></div>
    <table id="photos-table">
      <thead>
        <tr>
          <th>Photo</th>
          <th>Album</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <button id="prev-page" onclick="previousPage()" disabled>Previous</button>
    <button id="next-page" onclick="nextPage()" disabled>Next</button>
  </div>
    <script src="./script.js"></script>
  </body>
</html>
